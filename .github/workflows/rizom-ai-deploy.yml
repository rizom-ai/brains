name: Deploy

on:
  workflow_run:
    workflows: ["Publish Brain Model Images"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: apps/rizom-ai
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd ../..
          bun install --frozen-lockfile

      - name: Extract config from brain.yaml
        run: |
          INSTANCE_NAME="$(basename "$PWD")"
          BRAIN_MODEL="$(grep '^brain:' brain.yaml | sed 's/^brain:[[:space:]]*//' | tr -d '"' | tr -d "'")"
          BRAIN_DOMAIN="$(grep '^domain:' brain.yaml | sed 's/^domain:[[:space:]]*//' | tr -d '"' | tr -d "'")"
          PREVIEW_DOMAIN="preview.$BRAIN_DOMAIN"
          echo "INSTANCE_NAME=$INSTANCE_NAME" >> "$GITHUB_ENV"
          echo "BRAIN_MODEL=$BRAIN_MODEL" >> "$GITHUB_ENV"
          echo "BRAIN_DOMAIN=$BRAIN_DOMAIN" >> "$GITHUB_ENV"
          echo "PREVIEW_DOMAIN=$PREVIEW_DOMAIN" >> "$GITHUB_ENV"

      - name: Validate env via varlock
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_IMAGE_KEY: ${{ secrets.AI_IMAGE_KEY }}
          GIT_SYNC_TOKEN: ${{ secrets.GIT_SYNC_TOKEN }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SSH_KEY_NAME: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
          HCLOUD_SERVER_TYPE: ${{ secrets.HCLOUD_SERVER_TYPE }}
          HCLOUD_LOCATION: ${{ secrets.HCLOUD_LOCATION }}
          KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CERTIFICATE_PEM: ${{ secrets.CERTIFICATE_PEM }}
          PRIVATE_KEY_PEM: ${{ secrets.PRIVATE_KEY_PEM }}
        run: npx -y varlock load --path .env.schema --show-all

      - name: Load env via varlock
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_IMAGE_KEY: ${{ secrets.AI_IMAGE_KEY }}
          GIT_SYNC_TOKEN: ${{ secrets.GIT_SYNC_TOKEN }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SSH_KEY_NAME: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
          HCLOUD_SERVER_TYPE: ${{ secrets.HCLOUD_SERVER_TYPE }}
          HCLOUD_LOCATION: ${{ secrets.HCLOUD_LOCATION }}
          KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CERTIFICATE_PEM: ${{ secrets.CERTIFICATE_PEM }}
          PRIVATE_KEY_PEM: ${{ secrets.PRIVATE_KEY_PEM }}
        run: |
          npx -y varlock load --path .env.schema --format json --compact > /tmp/varlock-env.json
          node <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          const env = JSON.parse(readFileSync('/tmp/varlock-env.json', 'utf8'));
          const githubEnvPath = process.env.GITHUB_ENV;

          if (!githubEnvPath) {
            throw new Error('Missing GITHUB_ENV');
          }

          const lines = Object.entries(env).flatMap(([key, value]) => {
            if (value === null || value === undefined) {
              return [];
            }

            const text = String(value).replace(/\r\n/g, '\n');
            if (text.includes('\n')) {
              return [];
            }

            return [key + '=' + text];
          });

          appendFileSync(githubEnvPath, lines.join('\n') + '\n');
          NODE

      - name: Build and push app image
        env:
          VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun ../../shell/app/scripts/build.ts

          BUILD_DIR="$(mktemp -d)"
          trap 'rm -rf "$BUILD_DIR"' EXIT

          cp -r dist "$BUILD_DIR/"

          if [ -d "dist/seed-content" ]; then
            cp -r dist/seed-content "$BUILD_DIR/"
          elif [ -d "seed-content" ]; then
            cp -r seed-content "$BUILD_DIR/"
          else
            mkdir -p "$BUILD_DIR/seed-content"
          fi

          if [ -d "public" ]; then
            cp -r public "$BUILD_DIR/"
          else
            mkdir -p "$BUILD_DIR/public"
          fi

          cp ../../deploy/docker/Dockerfile.prod "$BUILD_DIR/Dockerfile"
          cp ../../deploy/docker/package.prod.json "$BUILD_DIR/package.json"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker build -t "ghcr.io/rizom-ai/$INSTANCE_NAME:$VERSION" "$BUILD_DIR"
          docker push "ghcr.io/rizom-ai/$INSTANCE_NAME:$VERSION"

      - name: Write Kamal SSH key
        run: |
          node <<'NODE'
          import { mkdirSync, readFileSync, writeFileSync } from "node:fs";
          const env = JSON.parse(readFileSync('/tmp/varlock-env.json', 'utf8'));
          const privateKey = env.KAMAL_SSH_PRIVATE_KEY;
          if (privateKey === null || privateKey === undefined) {
            throw new Error('Missing KAMAL_SSH_PRIVATE_KEY');
          }

          let privateKeyText = String(privateKey).replace(/\r\n/g, '\n').replace(/\\n/g, '\n');
          if (!privateKeyText.endsWith('\n')) {
            privateKeyText += '\n';
          }

          const sshDir = process.env.HOME + '/.ssh';
          mkdirSync(sshDir, { recursive: true });
          writeFileSync(sshDir + '/id_ed25519', privateKeyText, {
            encoding: 'utf8',
            mode: 0o600,
          });
          NODE

      - name: Configure SSH client
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Write .kamal/secrets
        run: |
          mkdir -p .kamal
          node <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const deployYaml = readFileSync('config/deploy.yml', 'utf8');
          const env = JSON.parse(readFileSync('/tmp/varlock-env.json', 'utf8'));
          const secretNames = new Set([
            'KAMAL_REGISTRY_PASSWORD',
            'CERTIFICATE_PEM',
            'PRIVATE_KEY_PEM',
          ]);

          let inSecrets = false;
          for (const line of deployYaml.split(/\r?\n/)) {
            if (/^\s*secret:\s*$/.test(line)) {
              inSecrets = true;
              continue;
            }

            if (inSecrets) {
              const match = line.match(/^\s{4}-\s*([A-Z0-9_]+)\s*$/);
              if (match) {
                secretNames.add(match[1]);
                continue;
              }

              if (/^\S/.test(line)) {
                break;
              }
            }
          }

          const lines = [];
          for (const name of secretNames) {
            const value = env[name];
            if (value === null || value === undefined) {
              continue;
            }

            const text = String(value);
            const escaped = text.replace(/'/g, "\\'");
            lines.push(name + "='" + escaped + "'");
          }

          writeFileSync('.kamal/secrets', lines.join('\n') + '\n');
          NODE

      - name: Provision server
        id: provision
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HCLOUD_SSH_KEY_NAME: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
          HCLOUD_SERVER_TYPE: ${{ secrets.HCLOUD_SERVER_TYPE }}
          HCLOUD_LOCATION: ${{ secrets.HCLOUD_LOCATION }}
        run: |
          node <<'NODE'
          import { appendFileSync } from "node:fs";

          const token = process.env.HCLOUD_TOKEN;
          const instanceName = process.env.INSTANCE_NAME;
          const sshKeyName = process.env.HCLOUD_SSH_KEY_NAME;
          const serverType = process.env.HCLOUD_SERVER_TYPE;
          const location = process.env.HCLOUD_LOCATION;
          const outputPath = process.env.GITHUB_OUTPUT;
          if (!token) {
            throw new Error('Missing HCLOUD_TOKEN');
          }
          if (!instanceName) {
            throw new Error('Missing INSTANCE_NAME');
          }
          if (!sshKeyName) {
            throw new Error('Missing HCLOUD_SSH_KEY_NAME');
          }
          if (!serverType) {
            throw new Error('Missing HCLOUD_SERVER_TYPE');
          }
          if (!location) {
            throw new Error('Missing HCLOUD_LOCATION');
          }
          if (!outputPath) {
            throw new Error('Missing GITHUB_OUTPUT');
          }

          const headers = {
            Authorization: 'Bearer ' + token,
            'Content-Type': 'application/json',
          };

          const baseUrl = 'https://api.hetzner.cloud/v1';
          const labelSelector = 'brain=' + instanceName;

          async function readJson(response, label) {
            const text = await response.text();
            if (!text) {
              throw new Error(label + ' returned an empty response');
            }

            try {
              return JSON.parse(text);
            } catch {
              throw new Error(label + ' returned invalid JSON: ' + text);
            }
          }

          async function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function listServers() {
            const response = await fetch(
              baseUrl + '/servers?label_selector=' + encodeURIComponent(labelSelector),
              { headers },
            );
            const payload = await readJson(response, 'Hetzner server lookup');
            if (!response.ok || payload.servers === undefined) {
              throw new Error('Hetzner server lookup failed: ' + JSON.stringify(payload));
            }

            return Array.isArray(payload.servers) ? payload.servers : [];
          }

          async function createServer() {
            const response = await fetch(baseUrl + '/servers', {
              method: 'POST',
              headers,
              body: JSON.stringify({
                name: instanceName,
                server_type: serverType,
                image: 'ubuntu-22.04',
                location,
                ssh_keys: [sshKeyName],
                labels: { brain: instanceName },
              }),
            });
            const payload = await readJson(response, 'Hetzner server create');
            if (!response.ok || payload.server === undefined) {
              throw new Error('Hetzner server create failed: ' + JSON.stringify(payload));
            }

            return payload.server;
          }

          async function getServer(id) {
            const response = await fetch(baseUrl + '/servers/' + id, { headers });
            const payload = await readJson(response, 'Hetzner server poll');
            if (!response.ok || payload.server === undefined) {
              throw new Error('Hetzner server poll failed: ' + JSON.stringify(payload));
            }

            return payload.server;
          }

          let server = (await listServers())[0];
          if (!server) {
            server = await createServer();
          }

          while (server.status !== 'running' || !server.public_net?.ipv4?.ip) {
            await sleep(10000);
            server = await getServer(server.id);
          }

          const serverIp = server.public_net.ipv4.ip;
          appendFileSync(outputPath, 'server_ip=' + serverIp + '\n');
          if (process.env.GITHUB_ENV) {
            appendFileSync(process.env.GITHUB_ENV, 'SERVER_IP=' + serverIp + '\n');
          }
          NODE

      - name: Update Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SERVER_IP: ${{ steps.provision.outputs.server_ip }}
        run: |
          node <<'NODE'
          const token = process.env.CF_API_TOKEN;
          const zoneId = process.env.CF_ZONE_ID;
          const domain = process.env.BRAIN_DOMAIN;
          const serverIp = process.env.SERVER_IP;
          if (!token) {
            throw new Error('Missing CF_API_TOKEN');
          }
          if (!zoneId) {
            throw new Error('Missing CF_ZONE_ID');
          }
          if (!domain) {
            throw new Error('Missing BRAIN_DOMAIN');
          }
          if (!serverIp) {
            throw new Error('Missing SERVER_IP');
          }

          const headers = {
            Authorization: 'Bearer ' + token,
            'Content-Type': 'application/json',
          };
          const baseUrl = 'https://api.cloudflare.com/client/v4';

          async function readJson(response, label) {
            const text = await response.text();
            if (!text) {
              throw new Error(label + ' returned an empty response');
            }

            try {
              return JSON.parse(text);
            } catch {
              throw new Error(label + ' returned invalid JSON: ' + text);
            }
          }

          async function upsertRecord(name) {
            const lookup = await fetch(
              baseUrl + '/zones/' + zoneId + '/dns_records?type=A&name=' + encodeURIComponent(name),
              { headers },
            );
            const payload = await readJson(lookup, 'Cloudflare DNS lookup');
            if (!lookup.ok || !payload.success) {
              throw new Error('Cloudflare DNS lookup failed: ' + JSON.stringify(payload));
            }

            const existing = Array.isArray(payload.result) ? payload.result[0] : undefined;
            const response = await fetch(
              existing
                ? baseUrl + '/zones/' + zoneId + '/dns_records/' + existing.id
                : baseUrl + '/zones/' + zoneId + '/dns_records',
              {
                method: existing ? 'PUT' : 'POST',
                headers,
                body: JSON.stringify({
                  type: 'A',
                  name,
                  content: serverIp,
                  ttl: 1,
                  proxied: true,
                }),
              },
            );
            const result = await readJson(response, 'Cloudflare DNS upsert');
            if (!response.ok || !result.success) {
              throw new Error('Cloudflare DNS upsert failed: ' + JSON.stringify(result));
            }
          }

          const previewDomain = process.env.PREVIEW_DOMAIN;
          if (!previewDomain) {
            throw new Error('Missing PREVIEW_DOMAIN');
          }

          await upsertRecord(domain);
          await upsertRecord(previewDomain);
          NODE

      - name: Install Kamal
        run: |
          gem install --user-install kamal
          ruby -r rubygems -e 'puts Gem.user_dir + "/bin"' >> "$GITHUB_PATH"

      - name: Validate SSH key
        run: ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Wait for SSH access
        env:
          SERVER_IP: ${{ steps.provision.outputs.server_ip }}
        run: |
          SSH_USER="$(ruby -e 'require "yaml"; config = YAML.load_file("config/deploy.yml") || {}; puts(config.dig("ssh", "user") || "root")')"
          for attempt in $(seq 1 18); do
            if ssh "$SSH_USER@$SERVER_IP" true >/dev/null 2>&1; then
              exit 0
            fi
            echo "SSH not ready yet (attempt $attempt/18); retrying in 5s..."
            sleep 5
          done
          echo "SSH never became ready for $SSH_USER@$SERVER_IP" >&2
          exit 1

      - name: Deploy
        env:
          SERVER_IP: ${{ steps.provision.outputs.server_ip }}
          # Deploy the immutable app image for the exact commit being built.
          VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
        # `kamal setup` is idempotent: on a fresh server it installs Docker
        # + kamal-proxy + deploys; on an already-set-up server it skips the
        # install steps and just deploys. Using `setup` instead of `deploy`
        # means the workflow handles first-deploy and re-runs identically.
        run: kamal setup --skip-push

      - name: Verify origin TLS
        env:
          SERVER_IP: ${{ steps.provision.outputs.server_ip }}
        run: |
          curl -I -k --max-time 20 --resolve "$BRAIN_DOMAIN:443:$SERVER_IP" "https://$BRAIN_DOMAIN"
          curl -I -k --max-time 20 --resolve "$PREVIEW_DOMAIN:443:$SERVER_IP" "https://$PREVIEW_DOMAIN"

      - name: Dump remote proxy diagnostics
        if: failure()
        env:
          SERVER_IP: ${{ steps.provision.outputs.server_ip }}
        run: |
          SSH_USER="$(ruby -e 'require "yaml"; config = YAML.load_file("config/deploy.yml") || {}; puts(config.dig("ssh", "user") || "root")')"
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$SSH_USER@$SERVER_IP" '
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            echo "--- kamal-proxy logs ---"
            docker logs kamal-proxy --tail 200 || true
            echo "--- kamal-proxy inspect ---"
            docker inspect kamal-proxy || true
          '
