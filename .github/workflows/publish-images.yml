name: Publish Brain Model Images

on:
  # Continuous publish: every successful CI run on main produces a fresh
  # :latest tag + :<sha> tag for traceability.
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  # Release publish: tagged releases get semver tags (:v0.1.0, :0.1, etc.).
  release:
    types: [published]

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/rizom-ai

jobs:
  build:
    name: Build & Publish
    # Fork-safety: only run on the canonical repo. Forks that run CI
    # should not attempt to push to rizom-ai's GHCR namespace.
    if: |
      github.repository == 'rizom-ai/brains' &&
      (github.event_name == 'release' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Only public brain models are published. ranger and relay are
        # private until they have real content and implementations.
        # Add them here once they're ready to ship publicly.
        model: [rover]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install

      - name: Compile hydration scripts
        run: bun scripts/compile-hydration.ts

      - name: Build model bundle
        run: bun shell/app/scripts/build-model.ts ${{ matrix.model }}

      - name: Prepare Docker context
        run: |
          BUILD_DIR=$(mktemp -d)
          cp deploy/docker/Dockerfile.model "$BUILD_DIR/Dockerfile"
          cp deploy/docker/Caddyfile "$BUILD_DIR/Caddyfile"
          cp deploy/docker/package.prod.json "$BUILD_DIR/package.json"
          cp -r brains/${{ matrix.model }}/dist "$BUILD_DIR/dist"

          # Seed content
          if [ -d "brains/${{ matrix.model }}/seed-content" ]; then
            cp -r "brains/${{ matrix.model }}/seed-content" "$BUILD_DIR/seed-content"
          else
            mkdir -p "$BUILD_DIR/seed-content"
          fi

          # Public assets
          if [ -d "brains/${{ matrix.model }}/public" ]; then
            cp -r "brains/${{ matrix.model }}/public" "$BUILD_DIR/public"
          else
            mkdir -p "$BUILD_DIR/public"
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.model }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_DIR }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.model }}
          cache-to: type=gha,mode=max,scope=${{ matrix.model }}
