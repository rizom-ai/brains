name: Publish Brain Model Images

on:
  push:
    branches: ["main"]

concurrency:
  group: publish-images
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/rizom-ai

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  build:
    name: Build & Publish
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        model: [rover, ranger, relay]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install

      - name: Build model bundle
        run: bun shell/app/scripts/build-model.ts ${{ matrix.model }}

      - name: Prepare Docker context
        run: |
          BUILD_DIR=$(mktemp -d)
          cp deploy/docker/Dockerfile.model "$BUILD_DIR/Dockerfile"
          cp deploy/docker/Caddyfile "$BUILD_DIR/Caddyfile"
          cp deploy/docker/package.prod.json "$BUILD_DIR/package.json"
          cp -r brains/${{ matrix.model }}/dist "$BUILD_DIR/dist"

          # Seed content
          if [ -d "brains/${{ matrix.model }}/seed-content" ]; then
            cp -r "brains/${{ matrix.model }}/seed-content" "$BUILD_DIR/seed-content"
          else
            mkdir -p "$BUILD_DIR/seed-content"
          fi

          # Public assets
          if [ -d "brains/${{ matrix.model }}/public" ]; then
            cp -r "brains/${{ matrix.model }}/public" "$BUILD_DIR/public"
          else
            mkdir -p "$BUILD_DIR/public"
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.model }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.model }}:${{ github.sha }}
