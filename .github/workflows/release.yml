name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Fork-safety: only run on the canonical repo. Forks don't have
    # NPM_TOKEN and shouldn't create release PRs against their own copy.
    if: github.repository == 'rizom-ai/brains'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Bypass husky commit-msg hook. The changesets bot creates
          # multiple git commits during the version step and not all
          # of them use the `commit` input above — some internal
          # commits use hardcoded messages that fail the conventional
          # commit regex. CI-authored commits don't need the hook.
          HUSKY: "0"

      # Squash-merge the version PR immediately. The PR only bumps
      # package.json version and writes CHANGELOG.md — no source code
      # changes — so running CI on it is redundant with the CI that
      # already ran on main before this workflow started. Merging
      # immediately avoids the race condition where `gh pr checks
      # --watch` exits non-zero if no checks have been reported on
      # the branch yet.
      - name: Merge release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch
