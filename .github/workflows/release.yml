name: Release

on:
  push:
    branches: [main]
  # Manual trigger so operators can kick off a release run without
  # pushing a commit — handy for re-running a failed publish against
  # an already-bumped main, or for running a release out of band.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Fork-safety: only run on the canonical repo. Forks shouldn't
    # attempt to publish releases for the upstream packages.
    if: github.repository == 'rizom-ai/brains'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile

      # Single-run release flow:
      #
      #   1. `changeset version` consumes pending changesets and bumps
      #      package versions + writes CHANGELOG.md. Idempotent — a no-op
      #      when there are no pending changesets.
      #   2. Push the version bump commit back to main (if any files
      #      changed). Must happen BEFORE publish so the repo reflects
      #      reality even if the npm publish step crashes later; the
      #      retry semantics of `changeset publish` are "republish if
      #      version not on registry" so a re-run picks up cleanly.
      #   3. `changeset publish` runs `prepublishOnly` (compile hydration
      #      + bundle via packages/brain-cli/scripts/build.ts) then
      #      `npm publish`. Only publishes versions not already on npm.
      #
      # No version PR, no second workflow run dependency. Trade-off: no
      # review window on auto-generated version bumps. Fine for the
      # alpha cycle; revisit when we exit pre mode for stable releases.
      - name: Configure git for the bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version
        env:
          # @changesets/changelog-github hits the GitHub API to resolve
          # PR numbers, commit authors, and link URLs for the generated
          # changelog. Without a token, changeset version crashes before
          # it can write package.json or CHANGELOG.md.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run changeset:version

      - name: Commit and push version bump
        env:
          HUSKY: "0"
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): version packages"
            git push
          fi

      - name: Publish to npm
        env:
          # Trusted Publishing uses the GitHub Actions OIDC identity for
          # this workflow instead of a long-lived token. Explicitly blank
          # token env vars so npm cannot fall back to token auth if one is
          # present from runner or higher-scope Actions configuration.
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
        run: bun run changeset:publish
