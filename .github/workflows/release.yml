name: Release

on:
  # Chain off CI so a red build never produces an npm publish. Release
  # runs as a no-op when there are no pending changesets, which keeps
  # the downstream image/deploy chain linear (CI → Release → Publish
  # Images → Deploy) for both release and non-release pushes.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual trigger so operators can kick off a release run without
  # pushing a commit — handy for re-running a failed publish against
  # an already-bumped main, or for running a release out of band.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Fork-safety: only run on the canonical repo. Forks shouldn't
    # attempt to publish releases for the upstream packages.
    # For workflow_run events, also gate on the upstream CI run having
    # succeeded — workflow_run fires on both success and failure.
    if: >
      github.repository == 'rizom-ai/brains' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      DOCS_CONTENT_SYNC_TOKEN: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Single-run release flow:
      #
      #   1. `changeset version` consumes pending changesets and bumps
      #      package versions + writes CHANGELOG.md. Idempotent — a no-op
      #      when there are no pending changesets.
      #   2. Push the version bump commit back to main (if any files
      #      changed). Must happen BEFORE publish so the repo reflects
      #      reality even if the npm publish step crashes later; the
      #      retry semantics of `changeset publish` are "republish if
      #      version not on registry" so a re-run picks up cleanly.
      #   3. `changeset publish` runs `prepublishOnly` (bundle via
      #      packages/brain-cli/scripts/build.ts) then `npm publish`.
      #      Only publishes versions not already on npm.
      #
      # No version PR, no second workflow run dependency. Trade-off: no
      # review window on auto-generated version bumps. Fine for the
      # alpha cycle; revisit when we exit pre mode for stable releases.
      - name: Configure git for the bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version
        env:
          # @changesets/changelog-github hits the GitHub API to resolve
          # PR numbers, commit authors, and link URLs for the generated
          # changelog. Without a token, changeset version crashes before
          # it can write package.json or CHANGELOG.md.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run changeset:version

      - name: Commit and push version bump
        env:
          HUSKY: "0"
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): version packages"
            git push
          fi

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          bun run changeset:publish

      - name: Sync docs content repo
        if: env.DOCS_CONTENT_SYNC_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          gh repo clone rizom-ai/doc-brain-content "$workdir/content"
          git -C "$workdir/content" config user.name "github-actions[bot]"
          git -C "$workdir/content" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          bun scripts/sync-docs-content.ts --out "$workdir/content"
          git -C "$workdir/content" add -A doc

          if git -C "$workdir/content" diff --cached --quiet; then
            echo "Docs content is already up to date."
          else
            git -C "$workdir/content" commit -m "docs: sync from rizom-ai/brains@${source_sha:0:7}"
            git -C "$workdir/content" push origin HEAD:main
          fi

