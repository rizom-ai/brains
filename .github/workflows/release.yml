name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Fork-safety: only run on the canonical repo. Forks don't have
    # NPM_TOKEN and shouldn't create release PRs against their own copy.
    if: github.repository == 'rizom-ai/brains'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Bypass husky commit-msg hook. The changesets bot creates
          # multiple git commits during the version step and not all
          # of them use the `commit` input above — some internal
          # commits use hardcoded messages that fail the conventional
          # commit regex. CI-authored commits don't need the hook.
          HUSKY: "0"

      # Wait for the PR's CI to finish, then squash-merge it immediately.
      # GitHub's `--auto` flag requires branch protection with at least one
      # required status check, which we don't have configured. `gh pr checks
      # --watch` polls the PR checks until they complete or time out; if any
      # fail, the command exits non-zero and the merge step never runs, so
      # the safety is effectively the same.
      - name: Wait for PR checks and merge
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.changesets.outputs.pullRequestNumber }}
          gh pr checks "$PR" --repo ${{ github.repository }} --watch
          gh pr merge "$PR" --repo ${{ github.repository }} --squash --delete-branch
