name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Fork-safety: only run on the canonical repo. Forks don't have
    # NPM_TOKEN and shouldn't create release PRs against their own copy.
    if: github.repository == 'rizom-ai/brains'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Auto-merge the version PR as soon as it opens so changesets ships
      # without a manual click. Auto-merge waits for the required CI checks
      # to pass before actually merging — the same protection a human review
      # would enforce. Requires "Allow auto-merge" enabled in repo settings.
      - name: Auto-merge release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash
