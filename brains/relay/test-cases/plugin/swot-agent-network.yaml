id: relay-plugin-swot-agent-network
name: Derive Relay SWOT from team-memory agent network
description: Exercises Relay's normal assessment plugin against the Relay eval corpus.
type: plugin
tags:
  - relay
  - plugin
  - assessment
  - swot
plugin: swot
handler: deriveSwot

input: {}

expectedOutput:
  validateEach:
    - path: derivedAt
      exists: true
    - path: strengths[0].title
      exists: true
    - path: strengths[0].detail
      exists: true
    - path: opportunities[0].title
      exists: true
  qualityCriteria:
    minRelevanceScore: 3
    minAccuracyScore: 3
    minCoverageScore: 3
    minQualityScore: 3
    evaluationPrompt: |
      Evaluate this SWOT as Relay team-memory and peer-brain guidance.

      Good output:
      - uses the existing Relay corpus: team memory, synthesis, peer brains, agent directory, A2A/MCP links, skills, and public coordination surface
      - gives actionable implications for what the Relay team should strengthen, test, trust, or watch next
      - distinguishes approved/known peer-brain evidence from weaker or emerging evidence where relevant
      - stays about collaborative intelligence and coordination, not personal publishing or marketing

      Bad output:
      - treats Relay like a blog/newsletter/social publishing brain
      - invents future plugins such as decision records, meeting notes, RAG QA, or knowledge graph as if they already exist
      - generic business SWOT language without practical team-memory guidance
      - pure summary without a recommended next move
