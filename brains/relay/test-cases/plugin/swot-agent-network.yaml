id: relay-plugin-swot-agent-network
name: Derive Relay SWOT from team-memory agent network
description: Exercises Relay's normal assessment plugin against an explicit Relay team-memory capability network.
type: plugin
tags:
  - relay
  - plugin
  - assessment
  - swot
plugin: swot
handler: deriveSwot

input:
  skills:
    - name: Capture team knowledge
      description: Capture notes, links, summaries, docs, and decks into durable shared team memory.
      tags:
        - team-memory
        - capture
        - coordination
      examples:
        - Save this team decision with source context.
        - Turn this meeting thread into durable Relay memory.

    - name: Synthesize Relay memory
      description: Turn captured Relay material into grounded summaries, topics, and public-surface guidance.
      tags:
        - synthesis
        - summaries
        - topics
      examples:
        - Summarize the latest Relay POC sync.
        - Explain what the current Relay homepage can honestly claim.

    - name: Coordinate peer-brain exchange
      description: Use the local agent directory to resolve approved peer brains before A2A or MCP handoffs.
      tags:
        - a2a
        - mcp
        - agent-directory
      examples:
        - List approved peer brains before delegating work.
        - Prepare the handoff context for Partner Brain.

    - name: Audit Relay public surface
      description: Check that Relay public-site claims are supported by saved site content, summaries, and approved peer-brain context.
      tags:
        - site-content
        - audit
        - provenance
      examples:
        - Verify the homepage only claims workflows backed by saved Relay memory.
        - Flag unsupported public claims before a demo.

    - name: Review peer-brain routing risk
      description: Distinguish approved peer brains from discovered review-needed agents before relying on A2A or MCP handoffs.
      tags:
        - peer-brain
        - review-needed
        - handoff
      examples:
        - Trust Partner Brain for Relay handoff review.
        - Keep Old Agent in review before production delegation.

  agents:
    - id: partner-brain
      name: Partner Brain
      kind: team
      organization: Relay POC Team
      brainName: Partner Brain
      url: https://partner-brain.io/a2a
      status: approved
      discoveredAt: "2026-03-15T10:00:00.000Z"
      about: Partner Brain coordinates shared research, summaries, and cross-team knowledge retrieval for Relay evaluation fixtures.
      skills:
        - name: Durable knowledge retrieval
          description: Search prior notes, links, summaries, docs, and decks to recover grounded Relay context.
          tags:
            - search
            - team-memory
            - retrieval
        - name: Peer-brain handoff review
          description: Review A2A and MCP handoff packets for provenance, approved-agent routing, and useful next steps.
          tags:
            - a2a
            - mcp
            - coordination
        - name: Public-surface audit
          description: Check whether Relay public-site claims are supported by saved site content and summaries.
          tags:
            - site-content
            - synthesis
            - audit
      notes: Approved peer brain for Relay A2A and directory tests.

    - id: old-agent
      name: Old Agent
      kind: professional
      brainName: Old Agent
      url: https://old-agent.io/a2a
      status: discovered
      discoveredAt: "2026-03-10T10:00:00.000Z"
      about: Old Agent is a peer brain kept in the Relay directory for review-state tests.
      skills:
        - name: Basic semantic search
          description: Search previous entities, but without current approval for dependable Relay handoffs.
          tags:
            - search
            - review-needed
      notes: Review before relying on this peer for production A2A handoffs.

expectedOutput:
  validateEach:
    - path: derivedAt
      exists: true
    - path: strengths[0].title
      exists: true
    - path: strengths[0].detail
      exists: true
    - path: weaknesses[0].title
      exists: true
    - path: weaknesses[0].detail
      exists: true
    - path: opportunities[0].title
      exists: true
    - path: opportunities[0].detail
      exists: true
    - path: threats[0].title
      exists: true
    - path: threats[0].detail
      exists: true
  qualityCriteria:
    minRelevanceScore: 3
    minAccuracyScore: 3
    minCoverageScore: 3
    minQualityScore: 3
    evaluationPrompt: |
      Evaluate this SWOT as Relay team-memory and peer-brain guidance.

      Good output:
      - uses several supplied Relay capability areas, such as team memory capture, synthesis, peer-brain coordination, agent directory, A2A/MCP handoffs, or public-surface audit
      - gives practical implications for what the Relay team should strengthen, test, trust, or watch next
      - treats discovered/review-needed peer-brain capability as tentative rather than dependable
      - capability-area language is acceptable; specific agent names are not required
      - stays about collaborative intelligence and coordination, not personal publishing or marketing
      - for coverage, a concise SWOT can score 3+ when it covers at least three distinct Relay-specific themes across quadrants; do not require every named capability area to appear

      Bad output:
      - treats Relay like a blog/newsletter/social publishing brain
      - invents future plugins such as decision records, meeting notes, RAG QA, or knowledge graph as if they already exist
      - generic business SWOT language without practical team-memory guidance
      - pure summary without any practical implication
