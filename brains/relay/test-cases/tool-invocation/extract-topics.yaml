id: relay-tool-extract-topics
name: Extract Relay topics
description: Tests that the agent uses system_extract when asked to synthesize Relay topics from current content.
type: tool_invocation
tags:
  - relay
  - core
  - topics
  - system

turns:
  - userMessage: "Run one topic extraction pass over the current Relay team memory so it covers notes, links, summaries, agents, docs, and decks. Don't enumerate individual source IDs in your response; just confirm the pass and coverage at the entity-type level."

successCriteria:
  expectedTools:
    - toolName: system_extract
      shouldBeCalled: true
      argsContain:
        entityType: "topic"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "meeting-notes"
    - "decision-record"

efficiency:
  maxToolCalls: 8
  maxTokens: 30000
