id: social-media-generate-agent
name: Generate LinkedIn post via natural language
description: Tests that the agent uses system_generate to generate a social post when asked
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - social-media
  - linkedin
  - agent
  - core
  - preset-full

turns:
  - userMessage: "Create a LinkedIn post about ecosystem architecture and how it differs from traditional organizational design"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: social-post
        operation.kind: prompt
  responseNotContains:
    - "I cannot"
    - "social-media_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
