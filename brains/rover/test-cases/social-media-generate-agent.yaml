id: social-media-generate-agent
name: Generate LinkedIn post via natural language
description: Tests that the agent uses system_create to create a social post when asked
type: tool_invocation
tags:
  - social-media
  - linkedin
  - agent
  - core

turns:
  - userMessage: "Create a LinkedIn post about ecosystem architecture and how it differs from traditional organizational design"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "social-media_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
