id: multi-turn-web-chat-pdf-upload-summarize-action
name: Web chat PDF upload summarize action is read-only
description: Verifies the suggested Summarize PDF action reads the prior uploaded PDF without creating a note, document, or generated artifact.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-pdf-upload-summarize-action
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - pdf
  - regression
  - multi-turn
  - preset-default

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: distributed-systems-primer.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000701
    successCriteria:
      responseContains:
        - "distributed-systems-primer.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "Summarize the uploaded PDF."
    reusePreviousAttachments: true
    successCriteria:
      toolCountRange:
        max: 0
      responseContains:
        - "Distributed Systems Primer"
      responseNotContains:
        - "Confirmation required"
        - "Failed: Create"
        - 'Create "Notes on'
        - "saved"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: false
    - toolName: system_update
      shouldBeCalled: false
    - toolName: document_generate
      shouldBeCalled: false
  responseNotContains:
    - "Confirmation required"
    - "Failed: Create"
    - 'Create "Notes on'

efficiency:
  maxToolCalls: 0
  maxTokens: 40000
