id: multi-turn-agent-add-after-save-first-follow-up
name: Save Agent After Bare Save-First Follow-Up
description: Verifies that after refusing an unsaved A2A call, the agent treats a bare affirmative follow-up as consent to save the same agent domain
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - multi-turn
  - regression
  - preset-core

turns:
  - userMessage: "Can you talk to save-first-followup.example for me?"
    successCriteria:
      expectedTools:
        - toolName: agent_call
          shouldBeCalled: true
          argsContain:
            agent: "save-first-followup.example"
        - toolName: agent_connect
          shouldBeCalled: false
      responseContains:
        - "add"
      responseContainsAny:
        - ["directory", "saved local agents", "saved agent", "local agent"]
      responseNotContains:
        - "I called"
        - "Calling save-first-followup.example"

  - userMessage: "Yes please"
    successCriteria:
      expectedTools:
        - toolName: agent_connect
          shouldBeCalled: true
          argsContain:
            source.kind: "url"
            source.url: "save-first-followup.example"
      responseNotContains:
        - "No URL or domain provided"
        - "needs either content or a prompt"
        - "short description"

successCriteria: {}

efficiency:
  maxToolCalls: 4
  maxTokens: 35000
