id: multi-turn-playbook-show-action-retrieves-seed
name: Playbook Retrieval Uses Saved Seed
description: Verifies that Rover does not answer from playbook runtime evidence alone in the first knowledge loop; when asked to find the saved seed, Rover must use normal retrieval tools before saying it found it.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: web-chat-eval-playbook-show
  channelName: Web Chat Eval
tags:
  - onboarding
  - playbooks
  - multi-turn
  - preset-core

turns:
  - userMessage: "Start playbook rover-onboarding."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true
          argsContain:
            playbookId: rover-onboarding
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Tune Rover's brain identity: Rover should be a private thinking and publishing brain that helps me capture rough ideas, retrieve them, connect them, and turn notes into useful drafts. Its values are clarity, craft, usefulness, and ownership."
    successCriteria:
      expectedTools:
        - toolName: system_update
          shouldBeCalled: true
          argsContain:
            entityType: brain-character
      responseContains:
        - "Confirmation required"

  - userMessage: "Approve saving that brain identity."
    confirmPendingAction: true
    successCriteria:
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Update my anchor profile now: my name is Ada Morgan. My role is advisor, my audience is climate-tech founders, my expertise is resilient software systems, and my desired tone is clear, practical, quietly confident."
    successCriteria:
      expectedTools:
        - toolName: system_update
          shouldBeCalled: true
          argsContain:
            entityType: anchor-profile
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve saving that profile update."
    confirmPendingAction: true
    successCriteria:
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Start playbook rover-first-knowledge-loop."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true
          argsContain:
            playbookId: rover-first-knowledge-loop
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Save this first idea: low-friction incident reviews are climate work because they prevent repeated waste in compute and human attention."
    successCriteria:
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve saving that seed."
    confirmPendingAction: true
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
      responseNotContains:
        - "another seed"
        - "another note"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Find that saved note now."
    successCriteria:
      expectedTools:
        - toolName: system_extract
          shouldBeCalled: false
      expectedAnyTool:
        - toolNames:
            - system_get
            - system_search
          shouldBeCalled: true
      responseContains:
        - climate
      responseNotContains:
        - "I cannot"
        - "I don't have access"
        - "playbook_status"
        - "playbook_send_event"

successCriteria:
  expectedTools:
    - toolName: playbook_start
      shouldBeCalled: true
    - toolName: system_create
      shouldBeCalled: true
  expectedAnyTool:
    - toolNames:
        - system_get
        - system_search
      shouldBeCalled: true
  toolCountRange:
    min: 4
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "playbook_status"
    - "playbook_send_event"

efficiency:
  maxToolCalls: 16
  maxTokens: 180000
