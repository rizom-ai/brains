id: multi-turn-agent-add-after-refusal-no-approval-gate
name: Add Agent After Refusal Without Separate Approval Gate
description: Verifies that after refusing an unsaved agent call, an explicit add follow-up saves the agent without telling the user they still need a separate approval step
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - multi-turn
  - regression
  - preset-core

turns:
  - userMessage: "Can you talk to refusal-followup.example for me?"
    successCriteria:
      expectedTools:
        - toolName: agent_call
          shouldBeCalled: true
          argsContain:
            agent: "refusal-followup.example"
        - toolName: agent_connect
          shouldBeCalled: false
      responseContains:
        - "add"
        - "directory"

  - userMessage: "please add"
    successCriteria:
      expectedTools:
        - toolName: agent_connect
          shouldBeCalled: true
          argsContain:
            source.kind: "url"
            source.url: "refusal-followup.example"
      responseNotContains:
        - "approve it first"
        - "not approved yet"
        - "Once it’s ready and approved"
        - "Once it's ready and approved"
        - "discovered rather than approved"

successCriteria: {}

efficiency:
  maxToolCalls: 4
  maxTokens: 35000
