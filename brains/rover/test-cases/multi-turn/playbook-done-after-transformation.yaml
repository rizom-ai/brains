id: multi-turn-playbook-done-after-transformation
name: Playbook Done After Transformation
scope: rover
category: multi-turn
priority: high
description: Verifies Rover finishes onboarding after the first note has been retrieved and transformed, instead of leaving the run in Make something.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: web-chat-eval-playbook-done-after-transform
  channelName: Web Chat Eval
tags:
  - onboarding
  - playbooks
  - multi-turn
  - preset-core

turns:
  - userMessage: "Start the Rover onboarding playbook."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true

  - userMessage: "Use the Set up Rover action and continue to brain identity setup."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: CHOICE_1
      responseNotContains:
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Tune Rover's brain identity: Rover should be a private thinking and publishing brain that helps me capture rough ideas, retrieve them, connect them, and turn notes into useful drafts. Its values are clarity, craft, usefulness, and ownership."
    successCriteria:
      expectedTools:
        - toolName: system_update
          shouldBeCalled: true
          argsContain:
            entityType: brain-character
      responseContains:
        - "Confirmation required"

  - userMessage: "Approve saving that brain identity."
    confirmPendingAction: true
    successCriteria:
      responseContains:
        - "brain"
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Use the Skip for now action."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: SKIP
      responseNotContains:
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Save this first idea: woodchucks are fake woodpeckers."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: base
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "What should I call you"
        - "what should I call you"
        - "role"

  - userMessage: "Approve saving that first seed."
    confirmPendingAction: true
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
      responseNotContains:
        - "another note"
        - "another seed"
        - "another rough"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Use the Show me action and find that note now."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
      expectedAnyTool:
        - toolNames:
            - system_get
            - system_search
          shouldBeCalled: true
      responseContains:
        - "outline"
      responseNotContains:
        - "another note"
        - "another seed"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Do that as an outline."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: base
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "Here is"
        - "Here's"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve creating the outline."
    confirmPendingAction: true
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
      responseContains:
        - "Completed"
      responseNotContains:
        - "What should I call you"
        - "what should I call you"
        - "I cannot"
        - "I don't have access"

  - userMessage: "What is next?"
    successCriteria:
      expectedTools:
        - toolName: playbook_status
          shouldBeCalled: true
        - toolName: playbook_send_event
          shouldBeCalled: false
      responseNotContains:
        - "Want me to show"
        - "show the saved note"
        - "ask for it yourself"
        - "outline for later writing"
        - "short draft, or a reusable brief"
        - "What should I call you"
        - "what should I call you"
        - "another note"
        - "another seed"
        - "I cannot"
        - "I don't have access"

successCriteria:
  expectedTools:
    - toolName: playbook_start
      shouldBeCalled: true
    - toolName: playbook_send_event
      shouldBeCalled: true
    - toolName: system_create
      shouldBeCalled: true
  responseNotContains:
    - "Want me to show"
    - "show the saved note"
    - "ask for it yourself"
    - "another note"
    - "another seed"
    - "I cannot"
    - "I don't have access"
  minInstructionFollowingScore: 3

efficiency:
  maxToolCalls: 22
  maxTokens: 260000
