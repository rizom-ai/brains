id: multi-turn-playbook-blocks-early-next
name: Playbook Blocks Early Next Without Valid Action
description: Verifies that Rover does not advance a playbook from Welcome on a generic early Next/continue request before the user selects a valid authored action.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: web-chat-eval-playbook-gate
  channelName: Web Chat Eval
tags:
  - onboarding
  - playbooks
  - multi-turn
  - preset-core

turns:
  - userMessage: "Start the Rover onboarding playbook."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true
          argsContain:
            playbookId: rover-onboarding
      responseContains:
        - Rover
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Next. I have not chosen Set up Rover or Not now yet."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: false
        - toolName: system_create
          shouldBeCalled: false
        - toolName: system_update
          shouldBeCalled: false
      responseContains:
        - "Set up Rover"
      responseNotContains:
        - "What should I call you"
        - "what should I call you"
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Use the Set up Rover action."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: CHOICE_1
      responseContains:
        - "What should I call you"
      responseNotContains:
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"

successCriteria:
  expectedTools:
    - toolName: playbook_start
      shouldBeCalled: true
    - toolName: playbook_send_event
      shouldBeCalled: true
  toolCountRange:
    max: 5
  responseNotContains:
    - "Confirmation required"
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 120000
