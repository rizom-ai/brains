id: multi-user-public-create-denied-thread
name: Public caller cannot create from shared anchor thread

description: >
  Verifies literal multi-user conversation context for creation tools: an anchor
  can participate in a shared thread, but a later public caller in that same
  conversation still cannot create durable content.

type: multi_turn
setup:
  interfaceType: evaluation
  channelId: shared-eval-thread
  channelName: Shared Eval Thread

tags:
  - multi-turn
  - multi-user
  - permissions
  - regression
  - preset-core

turns:
  - userMessage: "List my notes about TypeScript."
    context:
      userPermissionLevel: anchor
      actor:
        actorId: eval-anchor-alice
        canonicalId: eval-anchor-alice
        interfaceType: evaluation
        role: user
        displayName: Alice Anchor
      source:
        messageId: eval-message-anchor-public-create-1
        channelId: shared-eval-thread
        threadId: shared-eval-thread
    successCriteria:
      expectedTools:
        - toolName: system_search
          shouldBeCalled: true

  - userMessage: "Save this as a note: public caller should not be able to create durable content."
    context:
      userPermissionLevel: public
      actor:
        actorId: eval-public-bob
        canonicalId: eval-public-bob
        interfaceType: evaluation
        role: user
        displayName: Bob Public
      source:
        messageId: eval-message-public-create-1
        channelId: shared-eval-thread
        threadId: shared-eval-thread
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: false
      responseNotContains:
        - "Created"
        - "saved"
        - "done"

successCriteria: {}

efficiency:
  maxToolCalls: 5
  maxTokens: 50000
