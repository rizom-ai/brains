id: social-media-generate-cover-for-existing
name: Generate cover image for previously created post
description: Tests that in a multi-turn conversation, the agent uses system_create with entityType "image" and targetEntityType when asked to add a cover image to a previously generated post
type: multi_turn
tags:
  - social-media
  - image
  - cover
  - multi-turn

turns:
  - userMessage: "Generate a LinkedIn post about the future of AI"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
  - userMessage: "Now generate a cover image for that post"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: "image"
            targetEntityType: "social-post"

successCriteria: {}

efficiency:
  maxToolCalls: 6
  maxTokens: 50000
