id: social-media-generate-cover-for-existing
name: Generate cover image for previously created post
description: Tests that a prompt-created social post returns an addressable entity id, and the follow-up cover-image request uses that id directly instead of searching for a still-generating entity
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - social-media
  - image
  - cover
  - multi-turn
  - preset-full

turns:
  - userMessage: "Generate a LinkedIn post about the future of AI"
    successCriteria:
      expectedTools:
        - toolName: system_generate
          shouldBeCalled: true
          argsContain:
            entityType: "social-post"
            source.kind: "prompt"
      responseContains:
        - "Confirmation required"

  - userMessage: "Confirm creation"
    confirmPendingAction: true
    successCriteria:
      responseContains:
        - "Completed: Generate"

  - userMessage: "Now generate a cover image for that post"
    successCriteria:
      expectedTools:
        - toolName: system_generate
          shouldBeCalled: true
          argsContain:
            entityType: "image"
            source.kind: "prompt"
            targetEntityType: "social-post"
            coverImage: true

successCriteria: {}

efficiency:
  maxToolCalls: 6
  maxTokens: 50000
