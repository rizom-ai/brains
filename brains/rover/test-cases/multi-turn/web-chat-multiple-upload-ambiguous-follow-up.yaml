id: multi-turn-web-chat-multiple-upload-ambiguous-follow-up
name: Web chat multiple upload singular follow-up uses latest upload
description: Verifies multiple prior web-chat uploads remain inert and a singular follow-up acts on the latest upload instead of saving all uploads.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-multiple-upload-ambiguous
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - regression
  - multi-turn
  - preset-default

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: alpha-guide.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000901
    successCriteria:
      responseContains:
        - "alpha-guide.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: ""
    attachments:
      - kind: file
        filename: beta-diagram.png
        mediaType: image/png
        dataBase64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII=
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000902
    successCriteria:
      responseContains:
        - "beta-diagram.png"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "save it"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: image
            source.kind: upload
            source.transform: preserve
            source.upload.kind: upload
            source.upload.id: upload-00000000-0000-4000-8000-000000000902
          argsAbsent:
            - sourceAttachment
        - toolName: system_generate
          shouldBeCalled: false
      toolCountRange:
        max: 1
      responseNotContains:
        - "alpha-guide.pdf"
        - "which"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: image
        source.kind: upload
        source.transform: preserve
        source.upload.kind: upload
        source.upload.id: upload-00000000-0000-4000-8000-000000000902
      argsAbsent:
        - sourceAttachment
    - toolName: system_generate
      shouldBeCalled: false
  responseNotContains:
    - "alpha-guide.pdf"
    - "which"

efficiency:
  maxToolCalls: 1
  maxTokens: 40000
