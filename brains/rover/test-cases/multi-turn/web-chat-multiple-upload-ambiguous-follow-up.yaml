id: multi-turn-web-chat-multiple-upload-ambiguous-follow-up
name: Web chat multiple upload ambiguous follow-up clarifies
description: Verifies multiple prior web-chat uploads remain inert and an ambiguous follow-up asks which upload to use instead of guessing.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-multiple-upload-ambiguous
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - regression
  - multi-turn

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: alpha-guide.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: web-chat-upload
          id: upload-00000000-0000-4000-8000-000000000901
    successCriteria:
      responseContains:
        - "alpha-guide.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: ""
    attachments:
      - kind: file
        filename: beta-diagram.png
        mediaType: image/png
        dataBase64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII=
        source:
          kind: web-chat-upload
          id: upload-00000000-0000-4000-8000-000000000902
    successCriteria:
      responseContains:
        - "beta-diagram.png"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "save it"
    successCriteria:
      toolCountRange:
        max: 0
      responseContains:
        - "which"
      responseNotContains:
        - "Created"
        - "Saved"
        - "generated"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: false
    - toolName: system_update
      shouldBeCalled: false
    - toolName: system_delete
      shouldBeCalled: false
  responseNotContains:
    - "Created"
    - "generated"

efficiency:
  maxToolCalls: 0
  maxTokens: 40000
