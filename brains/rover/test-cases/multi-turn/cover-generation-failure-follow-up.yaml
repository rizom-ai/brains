id: cover-generation-failure-follow-up
name: Cover generation failure follow-up reports failure, not pending status
description: Verifies that after a cover-image request fails because the target post cannot be found, a follow-up like "is it ready?" does not imply the job is still pending
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - image
  - cover
  - multi-turn
  - failure-handling
  - preset-default

turns:
  - userMessage: "Generate a cover image for the blog post 'missing-cover-target-9f3c'"
    successCriteria:
      responseNotContains:
        - "started"
        - "queued"
  - userMessage: "is it ready?"
    successCriteria:
      expectedTools:
        - toolName: system_job_status
          shouldBeCalled: false
      responseContainsAny:
        - ["failed", "couldn't find", "isn’t found", "isn't found", "doesn’t exist", "doesn't exist"]
        - ["not found", "couldn't find", "isn’t found", "isn't found", "doesn’t exist", "doesn't exist"]
      responseNotContains:
        - "finished yet"
        - "don't have confirmation"
        - "still running"
        - "queued"
        - "started"

successCriteria:
  expectedTools:
    - toolName: system_get
      shouldBeCalled: true
      argsContain:
        entityType: "post"
        id: "missing-cover-target-9f3c"

efficiency:
  maxToolCalls: 4
  maxTokens: 33000
