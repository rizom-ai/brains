id: multi-turn-rover-onboarding-playbook
name: Rover Onboarding Playbook Conversation
description: Verifies that Rover starts the onboarding playbook, advances with playbook events, saves profile information through confirmation, and saves a first durable knowledge seed with automatic runtime evidence.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: web-chat-eval-onboarding
  channelName: Web Chat Eval
tags:
  - onboarding
  - playbooks
  - multi-turn

turns:
  - userMessage: "Start the Rover onboarding playbook."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true
          argsContain:
            playbookId: rover-onboarding
      responseContains:
        - Rover
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Yes, send the NEXT playbook event and continue to identity setup."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: NEXT
      responseNotContains:
        - "want to continue"
        - "continue onboarding"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Update my anchor profile now: my name is Ada Morgan. I advise climate-tech founders on resilient software systems and want a clear, practical, quietly confident voice."
    successCriteria:
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve saving that profile update."
    confirmPendingAction: true
    successCriteria:
      responseContains:
        - "Updated anchor profile"
      responseNotContains:
        - "Completed: Update \""
        - "I cannot"
        - "I don't have access"

  - userMessage: "Save this first idea: resilient software is a climate strategy because systems that fail less waste less energy and operator attention."
    successCriteria:
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "what is next"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve saving that first seed."
    confirmPendingAction: true
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
      responseContains:
        - "demonstrate"
      responseNotContains:
        - "what is next"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Go ahead and demonstrate that."
    successCriteria:
      expectedTools:
        - toolName: system_extract
          shouldBeCalled: false
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: NEXT
      responseContains:
        - retriev
      responseNotContains:
        - "another first"
        - "share a first"
        - "save a first idea"
        - "another seed"
        - "retrieval-demo"
        - "transformation-demo"
        - "wrap-up"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Let's do a social draft."
    successCriteria:
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "wrap-up"
        - "transformation stage"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Approve creating the social draft."
    confirmPendingAction: true
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
      responseContains:
        - draft
      responseNotContains:
        - "transformation stage"
        - "I cannot"
        - "I don't have access"

successCriteria:
  expectedTools:
    - toolName: playbook_start
      shouldBeCalled: true
    - toolName: playbook_send_event
      shouldBeCalled: true
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 5
  responseNotContains:
    - "retrieval-demo"
    - "transformation-demo"
    - "wrap-up"
    - "I cannot"
    - "I don't have access"
  minHelpfulnessScore: 3
  minInstructionFollowingScore: 3

efficiency:
  maxToolCalls: 16
  maxTokens: 160000
