id: multi-turn-web-chat-pdf-upload-summarize-latest-readonly
name: Web chat uploaded PDF summarize is read-only without attachment replay
description: Verifies that a suggested-style "Summarize the uploaded PDF" follow-up summarizes the latest PDF upload directly instead of saving a generated note or document.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-pdf-upload-summarize-latest-readonly
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - pdf
  - regression
  - multi-turn
  - preset-core

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: distributed-systems-primer.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000001201
    successCriteria:
      responseContains:
        - "distributed-systems-primer.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "Summarize the uploaded PDF."
    successCriteria:
      toolCountRange:
        max: 0
      responseContains:
        - "Distributed Systems Primer"
      responseNotContains:
        - "Confirmation required"
        - "Completed: Create"
        - "draft is generating"
        - "saved"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: false
    - toolName: system_upload_save
      shouldBeCalled: false
    - toolName: document_generate
      shouldBeCalled: false
  responseNotContains:
    - "Confirmation required"
    - "Completed: Create"
    - "draft is generating"

efficiency:
  maxToolCalls: 0
  maxTokens: 40000
