id: multi-turn-web-chat-pdf-upload-save-action
name: Web chat PDF upload Save document action promotes document
description: Verifies the suggested Save document action calls system_create with entityType document and the prior upload ref, not a base note.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-pdf-upload-save-action
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - pdf
  - document
  - regression
  - multi-turn
  - preset-full

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: distributed-systems-primer.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000702
    successCriteria:
      responseContains:
        - "distributed-systems-primer.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "Save the uploaded PDF as a document."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: document
            upload.kind: upload
            upload.id: upload-00000000-0000-4000-8000-000000000702
          argsAbsent:
            - transform
            - from
            - fromUpload
            - sourceAttachment
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "entityType: base"
        - "Notes on distributed systems primer"
        - "Failed: Create"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: document
        upload.kind: upload
        upload.id: upload-00000000-0000-4000-8000-000000000702
      argsAbsent:
        - transform
        - from
        - fromUpload
        - sourceAttachment
    - toolName: document_generate
      shouldBeCalled: false
    - toolName: system_update
      shouldBeCalled: false
  responseNotContains:
    - "entityType: base"
    - "Notes on distributed systems primer"
    - "Failed: Create"

efficiency:
  maxToolCalls: 1
  maxTokens: 40000
