id: multi-turn-web-chat-image-upload-save-follow-up
name: Web chat image upload follow-up promotes image
description: Verifies a bare web-chat image upload is inert, then an explicit save-as-image follow-up calls system_create with the prior upload ref instead of generating a new image.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-image-upload-save
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - image
  - regression
  - multi-turn
  - preset-core

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: drunken-robot.png
        mediaType: image/png
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000601
    successCriteria:
      responseContains:
        - "drunken-robot.png"
        - "What would you like me to do"
      responseNotContains:
        - "upload-00000000-0000-4000-8000-000000000601"
      toolCountRange:
        max: 0

  - userMessage: "can you save it as an image"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: image
            upload.kind: upload
            upload.id: upload-00000000-0000-4000-8000-000000000601
          argsAbsent:
            - prompt
            - transform
            - from
            - fromUpload
            - sourceAttachment
      responseNotContains:
        - "generated"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: image
        upload.kind: upload
        upload.id: upload-00000000-0000-4000-8000-000000000601
      argsAbsent:
        - prompt
        - transform
        - from
        - fromUpload
        - sourceAttachment
    - toolName: system_update
      shouldBeCalled: false
    - toolName: system_delete
      shouldBeCalled: false
  responseNotContains:
    - "generated"

efficiency:
  maxToolCalls: 1
  maxTokens: 40000
