id: multi-turn-web-chat-latest-image-upload-describe
name: Web chat latest uploaded image is described without ambiguity
summary: Newer image upload should be the referent for "the uploaded image" even when older uploads exist.
description: Verifies that after multiple uploads, including a previous image and a PDF, a singular "Describe the uploaded image" follow-up resolves to the latest image upload instead of asking which prior image is meant.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-latest-image-upload-describe
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - image
  - regression
  - multi-turn
  - preset-core

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: drunken-robot.png
        mediaType: image/png
        dataBase64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000001101
    successCriteria:
      responseContains:
        - "drunken-robot.png"
      toolCountRange:
        max: 0

  - userMessage: ""
    attachments:
      - kind: file
        filename: distributed-systems-primer.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000001102
    successCriteria:
      responseContains:
        - "distributed-systems-primer.pdf"
      toolCountRange:
        max: 0

  - userMessage: ""
    attachments:
      - kind: file
        filename: flirty-robot.png
        mediaType: image/png
        dataBase64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADUlEQVR42mP8z8BQDwAFgwJ/lHnqJQAAAABJRU5ErkJggg==
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000001103
    successCriteria:
      responseContains:
        - "flirty-robot.png"
      toolCountRange:
        max: 0

  - userMessage: "Describe the uploaded image."
    successCriteria:
      toolCountRange:
        max: 0
      responseNotContains:
        - "which one"
        - "which image"
        - "drunken-robot.png"
        - "flirty-robot.png or drunken-robot.png"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: false
    - toolName: system_upload_save
      shouldBeCalled: false
  responseNotContains:
    - "which one"
    - "which image"
    - "flirty-robot.png or drunken-robot.png"

efficiency:
  maxToolCalls: 0
  maxTokens: 50000
