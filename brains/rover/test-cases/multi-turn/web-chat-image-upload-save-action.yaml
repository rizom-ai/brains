id: multi-turn-web-chat-image-upload-save-action
name: Web chat image upload Save image action promotes image
description: Verifies the suggested Save image action calls system_create with entityType image and the prior upload ref instead of refusing or generating a new image.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-image-upload-save-action
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - image
  - regression
  - multi-turn
  - preset-core

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: drunken-robot.png
        mediaType: image/png
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000703
    successCriteria:
      responseContains:
        - "drunken-robot.png"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "Save the uploaded image."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: image
            upload.kind: upload
            upload.id: upload-00000000-0000-4000-8000-000000000703
          argsAbsent:
            - prompt
            - transform
            - from
            - fromUpload
            - sourceAttachment
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "couldn’t save"
        - "couldn't save"
        - "generated"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: image
        upload.kind: upload
        upload.id: upload-00000000-0000-4000-8000-000000000703
      argsAbsent:
        - prompt
        - transform
        - from
        - fromUpload
        - sourceAttachment
    - toolName: system_update
      shouldBeCalled: false
    - toolName: system_delete
      shouldBeCalled: false
  responseNotContains:
    - "couldn’t save"
    - "couldn't save"
    - "generated"

efficiency:
  maxToolCalls: 1
  maxTokens: 40000
