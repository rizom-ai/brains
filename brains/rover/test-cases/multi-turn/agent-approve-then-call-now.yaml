id: multi-turn-agent-approve-then-call-now
name: Approve Then Call Uses Approved Status Immediately
description: Verifies that approving a discovered agent goes through confirmation, then an immediate follow-up call sees the approved status and proceeds to agent_call.
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - multi-turn
  - regression
  - preset-core

turns:
  - userMessage: "Approve old-agent.io"
    successCriteria:
      expectedTools:
        - toolName: system_update
          shouldBeCalled: true
          argsContain:
            entityType: "agent"
            id: "old-agent.io"
          argsAbsent:
            - confirmed
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "Approved"
        - "not approved yet"
        - "approve it first"
        - "still not approved"

  - userMessage: "Approve confirmation"
    confirmPendingAction: true
    successCriteria:
      responseContains:
        - "Completed: Update"

  - userMessage: "Can you talk to old-agent.io now?"
    successCriteria:
      expectedTools:
        - toolName: agent_call
          shouldBeCalled: true
          argsContain:
            agent: "old-agent.io"
      responseNotContains:
        - "not approved yet"
        - "approve it first"
        - "still not approved"
        - "discovered but not approved yet"

successCriteria: {}

efficiency:
  maxToolCalls: 5
  maxTokens: 35000
