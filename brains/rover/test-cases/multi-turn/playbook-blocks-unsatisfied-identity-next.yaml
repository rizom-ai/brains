id: multi-turn-playbook-blocks-unsatisfied-identity-next
name: Playbook Blocks Unsatisfied Identity Next
description: Verifies that Rover does not advance from Identity on a generic continue request before identity is saved or the authored Skip action is selected.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: web-chat-eval-playbook-identity-gate
  channelName: Web Chat Eval
tags:
  - onboarding
  - playbooks
  - multi-turn
  - preset-core

turns:
  - userMessage: "Start the Rover onboarding playbook."
    successCriteria:
      expectedTools:
        - toolName: playbook_start
          shouldBeCalled: true
          argsContain:
            playbookId: rover-onboarding
      responseContains:
        - Rover
      responseNotContains:
        - "I cannot"
        - "I don't have access"

  - userMessage: "Use the Set up Rover action."
    successCriteria:
      expectedTools:
        - toolName: playbook_send_event
          shouldBeCalled: true
          argsContain:
            event: CHOICE_1
      responseNotContains:
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"

  - userMessage: "Continue. I have not provided identity details and I have not chosen Skip for now."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: false
        - toolName: system_update
          shouldBeCalled: false
      responseNotContains:
        - "Alex Chen"
        - "role"
        - "seed"
        - "rough idea"
        - "fragment"
        - "Confirmation required"
        - "I cannot"
        - "I don't have access"


successCriteria:
  expectedTools:
    - toolName: playbook_start
      shouldBeCalled: true
    - toolName: playbook_send_event
      shouldBeCalled: true
  toolCountRange:
    max: 10
  responseNotContains:
    - "Confirmation required"
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 10
  maxTokens: 150000
