id: multi-turn-wishlist-lasagna-regression
name: Wishlist persists unfulfillable request across turns
description: Verifies that an unfulfillable physical-world request is saved as a wish via system_create and can be listed on the next turn.
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - wishlist
  - multi-turn
  - regression
  - preset-core

turns:
  - userMessage: "Can you make lasagna for me?"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: "wish"
      responseContains:
        - "Confirmation required"
      responseNotContains:
        - "I made lasagna"
        - "I made it"
        - "it is done"

  - userMessage: "Confirm wishlist save"
    confirmPendingAction: true
    successCriteria:
      responseContains:
        - "Completed"

  - userMessage: "Can you show me my wishlist"
    successCriteria:
      expectedTools:
        - toolName: system_list
          shouldBeCalled: true
          argsContain:
            entityType: "wish"
      responseContains:
        - "lasagna"
      responseNotContains:
        - "empty"

successCriteria: {}

efficiency:
  maxToolCalls: 5
  maxTokens: 40000
