id: multi-turn-web-chat-pdf-upload-note-import-follow-up
name: Web chat PDF upload follow-up imports markdown note
description: Verifies a bare web-chat PDF upload is inert, then an explicit note/markdown import follow-up calls system_create with transform extract-markdown instead of raw document promotion.
type: multi_turn
setup:
  permissionLevel: anchor
  interfaceType: web-chat
  channelId: eval-web-chat-pdf-note-import
  channelName: Web Chat Eval
tags:
  - web-chat
  - upload
  - pdf
  - note
  - regression
  - multi-turn
  - preset-default

turns:
  - userMessage: ""
    attachments:
      - kind: file
        filename: distributed-systems-primer.pdf
        mediaType: application/pdf
        dataBase64: 
        source:
          kind: upload
          id: upload-00000000-0000-4000-8000-000000000801
    successCriteria:
      responseContains:
        - "distributed-systems-primer.pdf"
        - "What would you like me to do"
      toolCountRange:
        max: 0

  - userMessage: "turn it into a note"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note
            source.kind: upload
            source.upload.kind: upload
            source.upload.id: upload-00000000-0000-4000-8000-000000000801
            source.transform: extract-markdown
          argsAbsent:
            - from
            - fromUpload
            - sourceAttachment
      responseNotContains:
        - "deck"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: note
        source.kind: upload
        source.upload.kind: upload
        source.upload.id: upload-00000000-0000-4000-8000-000000000801
        source.transform: extract-markdown
      argsAbsent:
        - from
        - fromUpload
        - sourceAttachment
    - toolName: system_generate
      shouldBeCalled: false
    - toolName: system_update
      shouldBeCalled: false
    - toolName: system_delete
      shouldBeCalled: false
  responseNotContains:
    - "deck"
    - "Please re-upload"
    - "re-upload"

efficiency:
  maxToolCalls: 1
  maxTokens: 40000
