      kind: entity_event
      stateId: profile
      observedAt: "2026-01-01T00:00:00.000Z"
      data:
        entityType: anchor-profile
        entityId: anchor-profile
        operation: updated
        title: Alex Chen
        contentPreview: "Alex Chen is a professional software architect and writer exploring distributed systems, sustainability, and urban technology."
expectedOutput:
  validateEach:
    - path: met
      equals: true
    - path: reason
      exists: true
