id: social-media-publish-agent
name: Handle publish request with no posts
description: Tests that the agent checks the latest LinkedIn draft/post state and responds clearly
type: response_quality
tags:
  - social-media
  - linkedin
  - agent
  - publish

turns:
  - userMessage: "Publish my latest LinkedIn post now"

successCriteria:
  # Agent should check for existing posts
  expectedTools:
    - toolName: system_list
      shouldBeCalled: true
  # Agent should describe the latest LinkedIn item clearly
  responseContains:
    - "LinkedIn"
