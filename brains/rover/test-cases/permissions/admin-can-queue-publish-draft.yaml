id: rover-permission-admin-can-queue-publish-draft
name: Admin user can queue a Rover publishing draft
description: >-
  Verifies the Admin side of the publish-action split: Admin callers may
  make publish commitments such as adding a social post draft to the publish
  queue.
type: tool_invocation
setup:
  permissionLevel: admin
tags:
  - rover
  - permissions
  - publish-action-policy
  - admin
  - preset-full

turns:
  - userMessage: >-
      Queue the draft LinkedIn post titled "Publish Policy Draft" for publishing.

successCriteria:
  expectedTools:
    - toolName: content-pipeline_queue
      shouldBeCalled: true
      argsContain:
        action: add
        entityType: social-post
  responseNotContains:
    - "permission denied"
    - "cannot queue"
    - "not allowed"
  minAccuracyScore: 4
  minInstructionFollowingScore: 4

efficiency:
  maxToolCalls: 5
  maxTokens: 20000
