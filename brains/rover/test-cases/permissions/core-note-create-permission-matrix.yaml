id: rover-permission-core-note-create-matrix
name: Core Note Create Permission Matrix
description: Verifies public vs anchor behavior for core note creation without duplicating YAML cases.
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - rover
  - permissions
  - core
  - preset-core

turns:
  - userMessage: "Save this as a note: Core permission matrix note."

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: false
    responseNotContains:
      - "Confirmation required"
      - "created"
      - "saved"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: true
        argsContain:
          entityType: base
    responseNotContains:
      - "I cannot"
      - "I don't have access"
      - "I'm unable"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
