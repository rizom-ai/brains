id: social-media-queue-list-agent
name: List social media publish queue
description: Tests that the agent uses the content pipeline queue tool to show queued social posts
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - social-media
  - queue
  - agent
  - preset-full

turns:
  - userMessage: "Show me what's in my LinkedIn publish queue"

successCriteria:
  expectedTools:
    - toolName: content-pipeline_queue
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
