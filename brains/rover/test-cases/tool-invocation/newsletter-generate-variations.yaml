id: tool-invocation-newsletter-generate-variations
name: Newsletter Generate Natural Language Variations
description: Tests that various phrasings of newsletter generation requests use system_generate
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - newsletter
  - natural-language
  - anti-hallucination
  - preset-full

turns:
  - userMessage: "Create a newsletter for my subscribers about remote work"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: newsletter
        operation.kind: prompt
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "newsletter_generate"

efficiency:
  maxToolCalls: 5
  maxTokens: 40000
