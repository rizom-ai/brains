id: tool-invocation-newsletter-generate
name: Newsletter Generation via system_create
description: Verifies that the agent uses system_create to generate a newsletter
type: tool_invocation
tags:
  - core
  - newsletter
  - anti-hallucination

turns:
  - userMessage: "Generate a newsletter about AI trends"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "newsletter_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
