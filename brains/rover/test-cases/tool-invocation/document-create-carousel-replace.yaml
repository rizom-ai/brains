id: tool-invocation-document-create-carousel-replace
name: Regenerate Deck Carousel Document
description: "Verifies regenerate requests force replacement of a saved deck carousel document"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - preset-full

turns:
  - userMessage: "Regenerate the carousel document for deck 'distributed-systems-primer'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.source.entityType: "deck"
        operation.source.entityId: "distributed-systems-primer"
        operation.attachmentType: "carousel"
        operation.replace: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
