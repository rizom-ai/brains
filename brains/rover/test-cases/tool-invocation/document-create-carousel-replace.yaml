id: tool-invocation-document-create-carousel-replace
name: Regenerate Deck Carousel Document
description: "Verifies regenerate requests force replacement of a saved deck carousel document"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - preset-full

turns:
  - userMessage: "Regenerate the carousel document for deck 'distributed-systems-primer'"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "document"
        source.kind: "attachment"
        source.sourceEntityType: "deck"
        source.sourceEntityId: "distributed-systems-primer"
        source.attachmentType: "carousel"
        replace: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
