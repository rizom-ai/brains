id: tool-invocation-extract-topics-broad-request
name: Extract Topics From Broad Request
description: >
  Regression test for broad topic-generation requests. Rover should treat
  "generate topics" / "just extract them" as a request to derive topic
  entities from existing content, not as a request to search for notes or ask
  the user to paste source text.
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - system
  - topics
  - extract
  - regression

turns:
  - userMessage: "Generate topics from my current content. Just extract them."

successCriteria:
  expectedTools:
    - toolName: system_extract
      shouldBeCalled: true
      argsContain:
        entityType: "topic"
    - toolName: system_search
      shouldBeCalled: false
    - toolName: system_list
      shouldBeCalled: false
  responseNotContains:
    - "send me the content"
    - "send me the text"
    - "source notes"
    - "existing notes"
    - "couldn’t extract topics"
    - "couldn't extract topics"
    - "I didn’t find any existing notes"
    - "I didn't find any existing notes"

efficiency:
  maxToolCalls: 1
  maxTokens: 30000
