id: tool-invocation-agent-call-by-anchor-name
name: Call Saved Agent by Anchor Name
description: Tests that the agent resolves an A2A directory entry by anchor/contact name rather than requiring the brain name
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - tool-invocation

turns:
  - userMessage: "Ask my contact Yeehaa about ecosystem architecture"

successCriteria:
  expectedTools:
    - toolName: a2a_call
      shouldBeCalled: true
      argsContain:
        agent: "yeehaa.io"
    - toolName: system_create
      shouldBeCalled: false
  responseNotContains:
    - "brain-labs.io"
    - "wishlist"
    - "wish"


efficiency:
  maxToolCalls: 3
  maxTokens: 25000
