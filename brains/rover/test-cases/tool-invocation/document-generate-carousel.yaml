id: tool-invocation-document-create-from-carousel
name: Save Deck Carousel as Document Entity
description: "Verifies system_create persists a deck carousel as a durable PDF document entity"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - document-create

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' as a PDF document"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "document"
        sourceAttachment.sourceEntityType: "deck"
        sourceAttachment.sourceEntityId: "distributed-systems-primer"
        sourceAttachment.attachmentType: "carousel"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 2
  maxTokens: 25000
