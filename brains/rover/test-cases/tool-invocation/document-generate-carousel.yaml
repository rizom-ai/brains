id: tool-invocation-document-create-from-carousel
name: Save Deck Carousel as Document Entity
description: "Verifies document_generate persists a deck carousel as a durable PDF document entity"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - document-generate

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' as a PDF document"

successCriteria:
  expectedTools:
    - toolName: document_generate
      shouldBeCalled: true
      argsContain:
        sourceEntityType: "deck"
        sourceEntityId: "distributed-systems-primer"
        attachmentType: "carousel"
    - toolName: system_create
      shouldBeCalled: false
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 2
  maxTokens: 25000
