id: tool-invocation-document-create-from-carousel
name: Save Deck Carousel as Document Entity
description: "Verifies system_generate renders a deck carousel as a durable PDF document artifact"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - document-create
  - preset-full

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' as a PDF document"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.source.entityType: "deck"
        operation.source.entityId: "distributed-systems-primer"
        operation.attachmentType: "carousel"
      argsAbsent:
        - operation.target
        - targetEntityType
        - targetEntityId
        - sourceEntityType
        - sourceEntityId
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 2
  maxTokens: 25000
