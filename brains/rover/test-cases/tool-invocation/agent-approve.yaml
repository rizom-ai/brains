id: tool-invocation-agent-approve
name: Approve Discovered Agent
description: Tests that approving a discovered contact uses system_update fields and waits for the standard confirmation flow instead of self-confirming.
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - tool-invocation
  - regression

turns:
  - userMessage: "Approve old-agent.io"

successCriteria:
  expectedTools:
    - toolName: system_update
      shouldBeCalled: true
      argsContain:
        entityType: "agent"
        id: "old-agent.io"
        fields.status: "approved"
      argsAbsent:
        - confirmed
  responseContains:
    - "Confirmation required"
  responseNotContains:
    - "Approved"
    - "field-based update rather than content replacement"
    - "It’s still not approved yet"
    - "It's still not approved yet"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
