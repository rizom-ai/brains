id: tool-invocation-system-create-note
name: Direct Note Creation via system_create
description: Verifies permission-aware behavior for direct note creation
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - core
  - system
  - entity-crud
  - permissions
  - preset-core

turns:
  - userMessage: "Save this as a note: Core permission matrix note."

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: false
    responseNotContains:
      - "Confirmation required"
      - "created"
      - "saved"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: true
        argsContain:
          entityType: base
        argsAbsent:
          - upload
          - sourceAttachment
          - from
    toolCountRange:
      min: 1
    responseNotContains:
      - "I cannot"
      - "note_create"
    minAccuracyScore: 3

efficiency:
  maxToolCalls: 6
  maxTokens: 25000
