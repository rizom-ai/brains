id: tool-invocation-system-create-note
name: Direct Note Creation via system_create
description: Verifies that the agent uses system_create with content for direct note creation
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - system
  - entity-crud

turns:
  - userMessage: "Save this as a note: The quick brown fox jumps over the lazy dog."

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: base
      argsAbsent:
        - upload
        - sourceAttachment
        - from
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "note_create"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 20000
