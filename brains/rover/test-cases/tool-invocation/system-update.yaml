id: tool-invocation-system-update
name: Entity Update via system_update
description: Verifies permission-aware behavior for modifying entity fields
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - core
  - system
  - entity-crud
  - permissions
  - preset-core

turns:
  - userMessage: "Update the status of my note 'typescript-patterns' to draft"

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_update
        shouldBeCalled: false
    responseNotContains:
      - "updated"
      - "changed"
      - "done"
  trusted:
    expectedTools:
      - toolName: system_update
        shouldBeCalled: true
    responseNotContains:
      - "updated"
      - "changed"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_update
        shouldBeCalled: true
    toolCountRange:
      min: 1
    responseNotContains:
      - "I cannot"
      - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
