id: tool-invocation-system-update
name: Entity Update via system_update
description: Verifies that the agent uses system_update to modify entity fields
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - system
  - entity-crud
  - preset-core

turns:
  - userMessage: "Update the status of my note 'typescript-patterns' to draft"

successCriteria:
  expectedTools:
    - toolName: system_update
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
