id: social-media-generate-post-with-image
name: Generate social post with cover image
description: Tests that the agent creates a social post with generic coverImage orchestration instead of guessing a future image target ID
type: tool_invocation
tags:
  - social-media
  - image
  - cover
  - core

turns:
  - userMessage: "Generate a LinkedIn post with a cover image about continuous learning in tech"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "social-post"
        coverImage.generate: true
      argsAbsent:
        - targetEntityType
        - targetEntityId
  responseNotContains:
    - "I cannot"
    - "I don't have access"
  minHelpfulnessScore: 3

efficiency:
  maxToolCalls: 1
  maxTokens: 30000
