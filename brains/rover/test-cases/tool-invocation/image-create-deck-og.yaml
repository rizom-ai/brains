id: tool-invocation-image-create-deck-og
name: Generate Deck OG Image
description: "Verifies system_generate renders a deck OG/social preview image and targets ogImageId"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - image
  - media
  - og-image
  - preset-default

turns:
  - userMessage: "Generate an OG image for deck 'distributed-systems-primer'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.sourceEntityType: "deck"
        operation.sourceEntityId: "distributed-systems-primer"
        operation.attachmentType: "og-image"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
