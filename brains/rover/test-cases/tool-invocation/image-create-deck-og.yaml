id: tool-invocation-image-create-deck-og
name: Generate Deck OG Image
description: "Verifies system_create renders a deck OG/social preview image and targets ogImageId"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - image
  - media
  - og-image
  - preset-default

turns:
  - userMessage: "Generate an OG image for deck 'distributed-systems-primer'"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "image"
        targetEntityType: "deck"
        targetEntityId: "distributed-systems-primer"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
