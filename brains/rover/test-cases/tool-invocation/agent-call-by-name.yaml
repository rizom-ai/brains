id: tool-invocation-agent-call-by-name
name: Call Agent by Name
description: Tests that the agent uses a2a_call with a domain name instead of requiring a full URL
type: tool_invocation
tags:
  - agent-directory
  - a2a
  - tool-invocation

turns:
  - userMessage: "Ask yeehaa about ecosystem architecture"

successCriteria:
  expectedTools:
    - toolName: a2a_call
      shouldBeCalled: true
      argsContain:
        agent: "https://yeehaa.io"
  responseNotContains:
    - "I need a URL"
    - "provide the full URL"
    - "I cannot"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
