id: tool-invocation-agent-call-by-name
name: Call Saved Agent by Domain
description: Tests that the agent uses a2a_call with a saved agent domain from the local directory
type: tool_invocation
tags:
  - agent-discovery
  - a2a
  - tool-invocation

turns:
  - userMessage: "Ask yeehaa.io about ecosystem architecture"

successCriteria:
  expectedTools:
    - toolName: a2a_call
      shouldBeCalled: true
      argsContain:
        agent: "yeehaa.io"
  responseNotContains:
    - "I need a URL"
    - "provide the full URL"
    - "I cannot"
    - "Add it first"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
