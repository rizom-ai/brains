id: tool-invocation-decks-generate
name: Deck Generation via system_generate
description: Verifies that the agent uses system_generate operation.kind prompt for broad deck generation
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - anti-hallucination
  - preset-default

turns:
  - userMessage: "Create a new slide deck about machine learning"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: deck
        operation.kind: prompt
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "decks_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
