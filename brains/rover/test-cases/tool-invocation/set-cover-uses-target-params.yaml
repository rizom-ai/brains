id: image-generate-uses-target-params
name: Image generate uses target entity params for cover image
description: Tests that when asked to generate a cover image for a specific entity, the agent uses system_create with entityType "image" and passes targetEntityType/targetEntityId in options
type: tool_invocation
tags:
  - image
  - cover
  - core

turns:
  - userMessage: "Generate a cover image for the blog post 'urban-sensing-networks'"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "image"
        targetEntityType: "post"
        targetEntityId: "urban-sensing-networks"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 25000
