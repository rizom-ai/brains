id: tool-invocation-blog-generate
name: Blog Post Generation via system_generate
description: Verifies that the agent uses system_generate with entityType post instead of old blog_generate tool
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - blog
  - anti-hallucination
  - preset-default

turns:
  - userMessage: "Generate a new blog post about AI"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: post
        operation.kind: prompt
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "blog_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
