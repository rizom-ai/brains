id: tool-invocation-blog-generate
name: Blog Post Creation via system_create
description: Verifies that the agent uses system_create with entityType post instead of old blog_generate tool
type: tool_invocation
tags:
  - core
  - blog
  - anti-hallucination

turns:
  - userMessage: "Generate a new blog post about AI"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "blog_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
