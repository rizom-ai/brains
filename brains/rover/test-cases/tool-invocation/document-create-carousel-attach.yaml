id: tool-invocation-document-create-carousel-attach
name: Save Deck Carousel and Attach to Social Post
description: "Verifies system_create saves a deck carousel PDF and attaches it to a target social post"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - preset-full

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' and attach it to social post 'publish-policy-draft'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        entityType: "document"
        source.kind: "attachment"
        source.sourceEntityType: "deck"
        source.sourceEntityId: "distributed-systems-primer"
        source.attachmentType: "carousel"
        targetEntityType: "social-post"
        targetEntityId: "publish-policy-draft"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
