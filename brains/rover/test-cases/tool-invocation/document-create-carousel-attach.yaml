id: tool-invocation-document-create-carousel-attach
name: Save Deck Carousel and Attach to Social Post
description: "Verifies system_create saves a deck carousel PDF and attaches it to a target social post"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - preset-full

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' and attach it to social post 'publish-policy-draft'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.sourceEntityType: "deck"
        operation.sourceEntityId: "distributed-systems-primer"
        operation.attachmentType: "carousel"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
