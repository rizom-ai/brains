id: tool-invocation-document-create-carousel-attach
name: Generate Deck Carousel PDF from Deck Source
description: "Verifies system_generate renders the carousel from a resolved deck source"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - document
  - media
  - preset-full

turns:
  - userMessage: "Save the carousel for deck 'distributed-systems-primer' and attach it to social post 'publish-policy-draft'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.source.entityType: "deck"
        operation.source.entityId: "distributed-systems-primer"
        operation.attachmentType: "carousel"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
