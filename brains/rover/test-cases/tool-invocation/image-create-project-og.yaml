id: tool-invocation-image-create-project-og
name: Generate Project OG Image
description: "Verifies system_generate renders a project OG/social preview image and targets ogImageId"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - portfolio
  - image
  - media
  - og-image
  - preset-full

turns:
  - userMessage: "Generate an OG image for project 'city-pulse'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        entityType: "image"
        source.kind: "attachment"
        source.sourceEntityType: "project"
        source.sourceEntityId: "city-pulse"
        source.attachmentType: "og-image"
        targetEntityType: "project"
        targetEntityId: "city-pulse"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
