id: tool-invocation-agent-call-unknown-domain
name: Verify or Refuse Unknown Agent by Domain
description: Tests that an unknown exact-domain agent request uses agent_call, does not create/connect a new agent, and reports verification/contact failure when no Agent Card can be verified.
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - agent-discovery
  - a2a
  - tool-invocation
  - preset-core

turns:
  - userMessage: "Ask unknown-agent.io about ecosystem architecture"

successCriteria:
  expectedTools:
    - toolName: agent_call
      shouldBeCalled: true
      argsContain:
        agent: "unknown-agent.io"
    - toolName: agent_connect
      shouldBeCalled: false
  responseContainsAny:
    - ["verify", "verified", "Agent Card", "contact", "reach"]
    - ["could not", "couldn’t", "unable", "failed"]
  responseNotContains:
    - "I called"
    - "I reached"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
