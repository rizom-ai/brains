id: tool-invocation-git-sync
name: Git Sync Backup Request
description: Tests that agent treats backing up the brain to git as a sync action
type: tool_invocation
tags:
  - core
  - directory-sync
  - tool-invocation
  - anti-hallucination

turns:
  - userMessage: "Can you backup my brain to git?"

successCriteria:
  expectedTools:
    - toolName: directory-sync_sync
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
  minHelpfulnessScore: 4
  minInstructionFollowingScore: 4

efficiency:
  maxToolCalls: 3
  maxTokens: 20000
