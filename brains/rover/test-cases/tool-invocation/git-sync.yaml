id: tool-invocation-git-sync
name: Git Sync Backup Request
description: Tests that agent treats backing up the brain to git as a sync action
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - directory-sync
  - tool-invocation
  - anti-hallucination
  - preset-core

turns:
  - userMessage: "Can you backup my brain to git?"

successCriteria:
  expectedAnyTool:
    - toolNames:
        - directory-sync_sync
        - directory-sync_status
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 3
  maxTokens: 20000
