id: tool-invocation-base-finalized-direct-create
name: Exact Note Uses Direct Create
description: Verifies exact note/base content is persisted directly, not regenerated via prompt.
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - shell
  - base
  - finalized-content
  - regression
  - preset-core

turns:
  - userMessage: |
      Save this note exactly, without rewriting:

      # Operating Notes

      - Preserve the user's approved wording.
      - Do not summarize finalized content.
      - Store it as-is.

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: note
        source.kind: text
      argsAbsent:
        - prompt
        - upload
        - sourceAttachment
        - from
  toolCountRange:
    min: 1
  responseNotContains:
    - "I'll generate"
    - "I summarized"
    - "I generated"
  minAccuracyScore: 4

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
