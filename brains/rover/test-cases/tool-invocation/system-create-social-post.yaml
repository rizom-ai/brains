id: tool-invocation-system-create-social-post
name: Social Post Generation via system_generate
description: Verifies the agent uses system_generate for newly generated social-post content
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - social-media
  - entity-crud
  - preset-full

turns:
  - userMessage: "Create a LinkedIn post about our latest product launch"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: social-post
        operation.kind: prompt
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
