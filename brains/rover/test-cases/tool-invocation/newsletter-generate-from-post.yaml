id: tool-invocation-newsletter-generate-from-post
name: Newsletter Generate From Blog Post
description: Verifies the agent uses system_create to generate a newsletter based on blog content
type: tool_invocation
tags:
  - core
  - newsletter
  - blog-integration
  - anti-hallucination

turns:
  - userMessage: "Create a newsletter based on my latest blog post"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "newsletter_generate"

efficiency:
  maxToolCalls: 8
  maxTokens: 50000
