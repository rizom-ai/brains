id: tool-invocation-newsletter-generate-from-post
name: Newsletter Generate From Blog Post
description: Verifies the agent uses system_generate to generate a newsletter based on blog content
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - newsletter
  - blog-integration
  - anti-hallucination
  - preset-full

turns:
  - userMessage: "Create a newsletter based on my latest blog post"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.entityType: newsletter
        operation.kind: prompt-from-source
        operation.source.entityType: post
        operation.source.entityId: event-sourcing-sustainability
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "newsletter_generate"

efficiency:
  maxToolCalls: 8
  maxTokens: 50000
