id: tool-invocation-system-delete
name: Entity Delete via system_delete
description: Verifies permission-aware behavior for removing content
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - core
  - system
  - entity-crud
  - permissions
  - preset-core

turns:
  - userMessage: "Delete the note 'green-software-principles'"

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_delete
        shouldBeCalled: false
    responseNotContains:
      - "deleted"
      - "removed"
      - "done"
  trusted:
    expectedTools:
      - toolName: system_delete
        shouldBeCalled: true
    responseNotContains:
      - "deleted"
      - "removed"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_delete
        shouldBeCalled: true
    toolCountRange:
      min: 1
    responseNotContains:
      - "I cannot"
      - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 20000
