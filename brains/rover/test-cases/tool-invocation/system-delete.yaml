id: tool-invocation-system-delete
name: Entity Delete via system_delete
description: Verifies that the agent uses system_delete when asked to remove content
type: tool_invocation
tags:
  - core
  - system
  - entity-crud

turns:
  - userMessage: "Delete the note 'green-software-principles'"

successCriteria:
  expectedTools:
    - toolName: system_delete
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 20000
