id: tool-invocation-search
name: System Search Invocation
description: Verifies that the agent uses system_search scoped to blog posts
type: tool_invocation
tags:
  - core
  - search

turns:
  - userMessage: "Search for blog posts about programming"

successCriteria:
  expectedTools:
    - toolName: system_search
      shouldBeCalled: true
      argsContain:
        entityType: "post"
  responseContains:
    - "programming"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "error"
    - "failed"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
