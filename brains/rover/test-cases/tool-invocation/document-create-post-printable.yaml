id: tool-invocation-document-create-post-printable
name: Save Blog Post as Printable PDF
description: "Verifies system_create persists a blog post printable PDF as a durable document entity"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - blog
  - document
  - media
  - printable
  - document-create
  - preset-full

turns:
  - userMessage: "Save the blog post 'Resilience Is Not Redundancy' as a printable PDF"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.sourceEntityType: "post"
        operation.sourceEntityId: "resilience-in-distributed-systems"
        operation.attachmentType: "printable"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
