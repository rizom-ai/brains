id: tool-invocation-document-create-post-printable
name: Save Blog Post as Printable PDF
description: "Verifies system_generate renders a blog post printable PDF as a durable document artifact"
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - blog
  - document
  - media
  - printable
  - document-create
  - preset-full

turns:
  - userMessage: "Save the blog post 'Resilience Is Not Redundancy' as a printable PDF"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "attachment"
        operation.source.entityType: "post"
        operation.source.entityId: "resilience-in-distributed-systems"
        operation.attachmentType: "printable"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 25000
