id: tool-invocation-set-cover-generate-by-reference
name: Generate Cover Image for Entity Resolved by Fuzzy Reference
description: Verifies that the agent searches for an existing post from a partial natural-language reference before generating a new cover image and uses the canonical target entity id
type: tool_invocation
tags:
  - core
  - image
  - cover
  - search

turns:
  - userMessage: "I don't like the cover image for my resilience post. Can you create a new one for me?"

successCriteria:
  expectedTools:
    - toolName: system_search
      shouldBeCalled: true
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "image"
        targetEntityType: "post"
        targetEntityId: "resilience-in-distributed-systems"
  responseNotContains:
    - "not found"
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 4
  maxTokens: 30000
