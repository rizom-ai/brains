id: tool-invocation-image-standalone-generate
name: Standalone image generation does not require a target entity
description: Verifies that a plain image generation request uses system_create for an image without cover-image target fields
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - image
  - web-chat
  - preset-core

turns:
  - userMessage: "Can you generate an image of a robot for me?"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "image"
      argsAbsent:
        - targetEntityType
        - targetEntityId
  responseNotContains:
    - "target entity was not found"
    - "Target entity not found"
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 1
  maxTokens: 25000
