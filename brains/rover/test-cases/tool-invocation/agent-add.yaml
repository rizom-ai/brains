id: tool-invocation-agent-add
name: Add Agent to Directory
description: Tests that the agent uses system_create for agent type when asked to add a contact
type: tool_invocation
tags:
  - agent-discovery
  - tool-invocation

turns:
  - userMessage: "Add yeehaa.io to my agent directory"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "agent"
        url: "yeehaa.io"
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
