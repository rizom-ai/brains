id: tool-invocation-agent-add
name: Add Agent to Directory
description: Tests that the agent uses agent-directory_add when asked to add a contact
type: tool_invocation
tags:
  - agent-directory
  - tool-invocation

turns:
  - userMessage: "Add yeehaa.io to my agent directory"

successCriteria:
  expectedTools:
    - toolName: agent-directory_add
      shouldBeCalled: true
      argsContain:
        url: "yeehaa.io"
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
