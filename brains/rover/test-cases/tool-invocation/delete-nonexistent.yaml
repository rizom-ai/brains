id: tool-invocation-delete-nonexistent
name: Delete Non-existent Entity
description: Tests that the agent handles deletion of a non-existent entity gracefully
type: tool_invocation
tags:
  - core
  - system
  - entity-crud
  - error-handling

turns:
  - userMessage: "Delete the note 'this-does-not-exist-anywhere'"

successCriteria:
  expectedTools:
    - toolName: system_delete
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 20000
