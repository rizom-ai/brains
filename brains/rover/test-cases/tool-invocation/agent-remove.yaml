id: tool-invocation-agent-remove
name: Archive Agent from Directory
description: Tests that the agent uses system_update to archive an agent
type: tool_invocation
tags:
  - agent-discovery
  - tool-invocation

turns:
  - userMessage: "Archive old-agent.io from my contacts"

successCriteria:
  expectedTools:
    - toolName: system_update
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
