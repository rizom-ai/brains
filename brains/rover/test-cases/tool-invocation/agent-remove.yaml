id: tool-invocation-agent-remove
name: Remove Agent from Directory
description: Tests that the agent uses agent-directory_remove when asked to remove a contact
type: tool_invocation
tags:
  - agent-directory
  - tool-invocation

turns:
  - userMessage: "Remove old-agent.io from my contacts"

successCriteria:
  expectedTools:
    - toolName: agent-directory_remove
      shouldBeCalled: true
      argsContain:
        agent: "old-agent.io"
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
