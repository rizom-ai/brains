id: tool-invocation-update-title
name: Update Entity Title
description: Tests that the agent uses system_update with correct entity reference to change a title
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - system
  - entity-crud
  - preset-core

turns:
  - userMessage: "Change the title of my note 'typescript-patterns' to 'TypeScript Pattern Notes'"

successCriteria:
  expectedTools:
    - toolName: system_update
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
