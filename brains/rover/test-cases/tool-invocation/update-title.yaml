id: tool-invocation-update-title
name: Update Entity Title
description: Tests permission-aware system_update behavior for changing a title
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - core
  - system
  - entity-crud
  - permissions
  - preset-core

turns:
  - userMessage: "Change the title of my note 'typescript-patterns' to 'TypeScript Pattern Notes'"

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_update
        shouldBeCalled: false
    responseNotContains:
      - "updated"
      - "changed the title"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_update
        shouldBeCalled: true
    responseNotContains:
      - "I cannot"
      - "I don't have access"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
