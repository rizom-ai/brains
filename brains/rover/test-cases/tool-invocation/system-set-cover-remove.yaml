id: tool-invocation-set-cover-remove
name: Remove Cover Image
description: Verifies that the agent uses system_update to remove an existing cover image reference
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - image
  - cover
  - preset-default

turns:
  - userMessage: "Remove the cover image from blog post 'resilience-in-distributed-systems'"

successCriteria:
  expectedTools:
    - toolName: system_update
      shouldBeCalled: true
      argsContain:
        entityType: "post"
        id: "resilience-in-distributed-systems"
        fields.coverImageId: null
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 25000
