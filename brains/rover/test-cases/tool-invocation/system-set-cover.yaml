id: tool-invocation-set-cover
name: Set Cover with Existing Image
description: Verifies that the agent correctly uses system_set-cover to attach an existing image to an entity
type: tool_invocation
tags:
  - core
  - image
  - cover

turns:
  - userMessage: "Set the image 'hero-banner' as the cover for blog post 'resilience-in-distributed-systems'"

successCriteria:
  expectedTools:
    - toolName: system_set-cover
      shouldBeCalled: true
      argsContain:
        entityType: "post"
        entityId: "resilience-in-distributed-systems"
        imageId: "hero-banner"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 40000
