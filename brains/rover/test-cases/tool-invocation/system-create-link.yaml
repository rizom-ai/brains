id: tool-invocation-system-create-link
name: Link Save via system_create
description: Verifies permission-aware behavior for saving a link
type: tool_invocation
setup:
  interfaceType: evaluation
tags:
  - core
  - system
  - link
  - entity-crud
  - permissions
  - preset-core

turns:
  - userMessage: "Save this link for me: https://anthropic.com/research"

successCriteria: {}

permissions:
  public:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: false
    responseNotContains:
      - "created"
      - "done"
  trusted:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: true
        argsContain:
          entityType: "link"
          url: "https://anthropic.com/research"
    responseNotContains:
      - "created"
      - "done"
  anchor:
    expectedTools:
      - toolName: system_create
        shouldBeCalled: true
        argsContain:
          entityType: "link"
          url: "https://anthropic.com/research"
    responseNotContains:
      - "I cannot"
      - "I don't have access"
      - "I'm unable"
      - "link_capture"
    minAccuracyScore: 3

efficiency:
  maxToolCalls: 5
  maxTokens: 25000
