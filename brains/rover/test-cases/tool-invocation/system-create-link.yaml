id: tool-invocation-system-create-link
name: Link Save via system_create
description: Verifies that the agent uses system_create with entityType link when asked to save a link
type: tool_invocation
tags:
  - core
  - system
  - link
  - entity-crud

turns:
  - userMessage: "Save this link for me: https://anthropic.com/research"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "link"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "link_capture"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
