id: tool-invocation-agent-add-explicit-save-no-approval-gate
name: Explicit Agent Save Does Not Require Separate Approval
description: Tests that explicitly saving an agent does not tell the user they still need a separate approval step
type: tool_invocation
tags:
  - agent-discovery
  - a2a
  - tool-invocation
  - regression

turns:
  - userMessage: "Save mylittlephoney.com as an agent in my directory"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "agent"
        url: "mylittlephoney.com"
  responseNotContains:
    - "approve it first"
    - "not approved yet"
    - "Once it’s ready and approved"
    - "Once it's ready and approved"
    - "discovered rather than approved"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
