id: tool-invocation-media-preview-carousel
name: Preview Carousel for Deck by ID
description: Verifies that the agent uses media-tools_preview-attachment to render a deck carousel PDF when given an explicit deck identifier
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - decks
  - carousel
  - media-tools
  - preview

turns:
  - userMessage: "Preview the carousel PDF for deck 'distributed-systems-primer'"

successCriteria:
  expectedTools:
    - toolName: media-tools_preview-attachment
      shouldBeCalled: true
      argsContain:
        entityType: "deck"
        entityId: "distributed-systems-primer"
        attachmentType: "carousel"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 3
  maxTokens: 25000
