id: tool-invocation-set-cover-generate
name: Generate Cover Image for Entity
description: Verifies that the agent uses system_generate with entityType "image" and passes targetEntityType/targetEntityId with coverImage when asked to generate a cover image
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - image
  - cover
  - preset-default

turns:
  - userMessage: "Generate a cover image for the blog post 'resilience-in-distributed-systems'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "cover-image"
        operation.targetEntityType: "post"
        operation.targetEntityId: "resilience-in-distributed-systems"
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 25000
