id: tool-invocation-set-cover-generate
name: Generate Cover Image for Entity
description: Verifies that the agent uses system_generate operation.kind cover-image with target.entityType/target.entityId when asked to generate a cover image
type: tool_invocation
setup:
  permissionLevel: anchor
tags:
  - core
  - image
  - cover
  - preset-default

turns:
  - userMessage: "Generate a cover image for the blog post 'resilience-in-distributed-systems'"

successCriteria:
  expectedTools:
    - toolName: system_generate
      shouldBeCalled: true
      argsContain:
        operation.kind: "cover-image"
        operation.target.entityType: "post"
        operation.target.entityId: "resilience-in-distributed-systems"
      argsAbsent:
        - operation.source
        - operation.attachmentType
        - targetEntityType
        - targetEntityId
        - sourceEntityType
        - sourceEntityId
        - coverImage
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 25000
