brain: rover
preset: default

# The consolidated production rizom.ai composition at the alpha.204
# pre-bundle baseline: Rover's default preset already carries
# blog/decks/site-builder; explicit additions preserve the registry
# (canonical ai.rizom.brain.* lexicons), product entities, newsletter,
# ecosystem surface, and site-content entity type.
add:
  - web-chat
  - atproto-registry
  - products
  - rizom-ecosystem
  - newsletter
  # Registers the site-content entity type — without it, directory-sync
  # cannot import site-content/<page>/<section>.md and every section
  # resolves empty.
  - site-content

# Local test app: anchor tools (build-site etc.) available over the MCP
# http transport.
permissions:
  rules:
    - pattern: "mcp:http"
      level: anchor

site:
  package: "@rizom/site-rizom-ai"
  theme: "@rizom/theme-rizom-ai"

plugins:
  mcp:
    mode: debug
  directory-sync:
    seedContentPath: /home/yeehaa/Documents/rizom-content
    autoSync: true
    initialSync: true
    git:
      repo: rizom-ai/rover-test-content
      gitUrl: file:///tmp/rover-rizom-ai-test-content.git
      bootstrapFromSeed: true
