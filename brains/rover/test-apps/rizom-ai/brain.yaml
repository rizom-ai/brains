brain: rover
preset: default

# The consolidated rizom.ai composition (docs/plans/rizom-consolidation.md
# Phase 2, decision 3): rover's default preset — which already carries
# blog/series/decks/site-builder — plus the registry (canonical
# ai.rizom.brain.* lexicons), ranger-ai's product entities, and the
# newsletter behind the /foundation follow band.
add:
  - web-chat
  - atproto-registry
  - products
  - rizom-ecosystem
  - newsletter

site:
  package: "@brains/site-rizom-ai"
  theme: "@brains/theme-rizom-ai"

plugins:
  directory-sync:
    seedContentPath: ../../eval-content-default
    autoSync: true
    initialSync: true
    git:
      repo: rizom-ai/rover-test-content
      gitUrl: file:///tmp/rover-rizom-ai-test-content.git
