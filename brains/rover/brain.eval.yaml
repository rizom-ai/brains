brain: rover
preset: full
mode: eval

suites:
  core:
    preset: core
    tags:
      - preset-core
    plugins:
      directory-sync:
        seedContentPath: eval-content-core
  default:
    extends: core
    preset: default
    tags:
      - preset-default
    plugins:
      directory-sync:
        seedContentPath: eval-content-default
  full:
    extends: default
    preset: full
    tags:
      - preset-full
    plugins:
      directory-sync:
        seedContentPath: eval-content-full

# Single model eval with OpenAI LLM judge
models:
  - gpt-5.4-mini
judge: gpt-5.4-mini

# Per-provider API keys (referenced from env)
keys:
  openai: ${OPENAI_API_KEY}

# Eval-specific config — safe subset for automated testing
# mode: eval disables interfaces and side-effect plugins (defined by evalDisable in brain model)

permissions:
  entityActions:
    post:
      update: trusted
      publish: anchor
    social-post:
      update: trusted
      publish: anchor
    newsletter:
      update: trusted
      publish: anchor

plugins:
  playbooks:
    triggers:
      first-anchor-web-chat: true
  directory-sync:
    seedContentPath: eval-content-full
    git:
      gitUrl: "file://${EVAL_GIT_REMOTE}"
