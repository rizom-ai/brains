id: shell-base-note-mapping
name: Base/Note Mapping for Capture Flows
description: Tests that note-like language and Discord-style uploaded text content map to the note entity type.
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - shell
  - tool-invocation
  - create
  - base
  - note
  - discord
  - preset-core

turns:
  - userMessage: "Capture this as a note: buy milk, eggs, and coffee filters"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note

  - userMessage: "Save this memo about the launch timeline"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note

  - userMessage: |
      save this file

      User uploaded a file "meeting-notes.md":

      # Meeting Notes
      - finalize onboarding checklist
      - align on rover pilot docs
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note

successCriteria: {}

efficiency:
  maxToolCalls: 9
  maxTokens: 60000
