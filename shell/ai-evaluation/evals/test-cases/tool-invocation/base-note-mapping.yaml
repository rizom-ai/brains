id: shell-base-note-mapping
name: Base/Note Mapping for Capture Flows
description: Tests that note-like language and Discord-style uploaded text content map to the note entity type.
type: multi_turn
setup:
  permissionLevel: anchor
tags:
  - shell
  - tool-invocation
  - create
  - base
  - note
  - discord
  - preset-core

turns:
  - userMessage: "Capture this as a note: buy milk, eggs, and coffee filters"
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note
            source.kind: text

  - userMessage: "yes"
    confirmPendingAction: true

  - userMessage: "Save this memo as a note: Launch timeline starts with beta invites on Monday and pilot feedback on Friday."
    successCriteria:
      expectedTools:
        - toolName: system_create
          shouldBeCalled: true
          argsContain:
            entityType: note
            source.kind: text

  - userMessage: "yes"
    confirmPendingAction: true

  - userMessage: |
      Capture this uploaded markdown transcript as a note:

      User uploaded a file "meeting-notes.md":

      # Meeting Notes
      - finalize onboarding checklist
      - align on rover pilot docs
    successCriteria:
      responseContainsAny:
        - ["Confirmation required", "Completed: Create note"]

successCriteria: {}

efficiency:
  maxToolCalls: 11
  maxTokens: 70000
