id: shell-no-verbose-repetition
name: No Verbose Repetition
description: Tests that agent answers identity/profile questions concisely from its system prompt without repetition
type: response_quality
tags:
  - shell
  - quality
  - conciseness
  - repetition

turns:
  - userMessage: "Show me my identity and my profile"

successCriteria:
  # Agent should answer from system prompt — no tool calls needed
  minHelpfulnessScore: 3
  minInstructionFollowingScore: 3

efficiency:
  maxToolCalls: 4
  maxTokens: 20000
