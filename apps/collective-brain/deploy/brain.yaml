brain: "@brains/ranger"

# Production instance
domain: rizom.ai

# Permissions
anchors:
  - "discord:1442828818493735015"
trusted:
  - "discord:624315360157499422"

plugins:
  directory-sync:
    git:
      repo: rizom-ai/collective-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Ranger
      authorEmail: collective@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  social-media:
    linkedin:
      accessToken: ${LINKEDIN_ACCESS_TOKEN}
      organizationId: ${LINKEDIN_ORGANIZATION_ID}
  analytics:
    cloudflare:
      accountId: ${CLOUDFLARE_ACCOUNT_ID}
      apiToken: ${CLOUDFLARE_API_TOKEN}
      siteTag: ${CLOUDFLARE_ANALYTICS_SITE_TAG}

