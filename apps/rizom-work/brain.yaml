brain: ranger
preset: default

# Instance settings
logLevel: info
domain: rizom.work

# Thin work site wrapper over shared Rizom base primitives.
# Owns the first work-specific composition seam while the broader
# Rizom site split is still happening inside the monorepo.
site:
  package: "@brains/site-rizom-work"

plugins:
  directory-sync:
    git:
      repo: rizom-ai/rizom-work-content
      authToken: ${GIT_SYNC_TOKEN}
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
