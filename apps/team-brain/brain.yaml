brain: relay

# Instance settings
logLevel: debug

# Relay's default preset now ships the minimal website + capture
# entities (note, link, topics, image). team-brain opts in to decks
# on top of that. (Old default included decks + summary; summary is
# deferred until it gets reworked.)
add:
  - decks

plugins:
  directory-sync:
    git:
      repo: rizom-ai/team-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Relay
      authorEmail: yeehaa@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
