brain: "@brains/relay"

# Production instance
domain: recall.rizom.ai

# Permissions
anchors:
  - "matrix:@yeehaa:rizom.ai"

plugins:
  directory-sync:
    git:
      repo: rizom-ai/team-brain-content
      authToken: ${GIT_SYNC_TOKEN}
