brain: ranger
preset: default

# Instance settings
logLevel: info
domain: rizom.ai

# Use the shared rizom site package with the `ai` variant.
# Same package serves rizom.foundation and rizom.work via different
# variants (foundation, work) — the variant flips the canvas, accent
# shade, and copy register.
site:
  package: "@brains/site-rizom"
  variant: ai
plugins:
  directory-sync:
    git:
      repo: rizom-ai/rizom-ai-content
      authToken: ${GIT_SYNC_TOKEN}
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
