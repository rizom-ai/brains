brain: rover
site: "@brains/site-yeehaa"
preset: full

# Production instance
domain: yeehaa.io

# Permissions
anchors:
  - "discord:1442828818493735015"

plugins:
  directory-sync:
    git:
      repo: rizom-ai/professional-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Yeehaa
      authorEmail: yeehaa@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
  a2a:
    trustedTokens:
      ${A2A_TOKEN_PHONEY}: mylittlephoney
    outboundTokens:
      mylittlephoney.com: ${A2A_OUTBOUND_TOKEN_PHONEY}
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  social-media:
    linkedin:
      accessToken: ${LINKEDIN_ACCESS_TOKEN}
  buttondown:
    apiKey: ${BUTTONDOWN_API_KEY}
  analytics:
    cloudflare:
      accountId: ${CLOUDFLARE_ACCOUNT_ID}
      apiToken: ${CLOUDFLARE_API_TOKEN}
      siteTag: ${CLOUDFLARE_ANALYTICS_SITE_TAG}
permissions:
  rules:
    - pattern: "a2a:mylittlephoney"
      level: trusted
    - pattern: "a2a:*"
      level: public
