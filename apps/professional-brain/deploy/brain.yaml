brain: "@brains/rover"
site: "@brains/site-yeehaa"
preset: pro

# Production instance
domain: yeehaa.io

# Permissions
anchors:
  - "matrix:@yeehaa:rizom.ai"
  - "discord:1442828818493735015"

plugins:
  directory-sync:
    git:
      repo: rizom-ai/professional-brain-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: Yeehaa
      authorEmail: yeehaa@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
  matrix:
    accessToken: ${MATRIX_ACCESS_TOKEN}
    userId: "@yeehaa-brain-bot:rizom.ai"
    homeserver: https://matrix.rizom.ai
    deviceDisplayName: Rover
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  social-media:
    linkedin:
      accessToken: ${LINKEDIN_ACCESS_TOKEN}
  newsletter:
    buttondown:
      apiKey: ${BUTTONDOWN_API_KEY}
  analytics:
    cloudflare:
      accountId: ${CLOUDFLARE_ACCOUNT_ID}
      apiToken: ${CLOUDFLARE_API_TOKEN}
      siteTag: ${CLOUDFLARE_ANALYTICS_SITE_TAG}
  webserver:
    productionDomain: https://yeehaa.io
    previewDomain: https://preview.yeehaa.io
