id: social-media-generate-post-with-image
name: Generate social post with cover image
description: Tests that the agent creates a social post and generates a cover image (may use system_create + image_generate)
type: tool_invocation
tags:
  - social-media
  - image
  - cover
  - core

turns:
  - userMessage: "Generate a LinkedIn post with a cover image about continuous learning in tech"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"
  minHelpfulnessScore: 3

efficiency:
  maxToolCalls: 12
  maxTokens: 30000
