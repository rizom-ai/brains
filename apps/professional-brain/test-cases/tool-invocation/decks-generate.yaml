id: tool-invocation-decks-generate
name: Deck Creation via system_create
description: Verifies that the agent uses system_create with entityType deck instead of old decks_generate tool
type: tool_invocation
tags:
  - core
  - decks
  - anti-hallucination

turns:
  - userMessage: "Create a new slide deck about machine learning"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "decks_generate"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
