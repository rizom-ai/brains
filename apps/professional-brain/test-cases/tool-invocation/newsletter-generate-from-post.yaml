id: tool-invocation-newsletter-generate-from-post
name: Newsletter Generate From Blog Post
description: Verifies the agent uses system_create to generate a newsletter referencing a blog post
type: tool_invocation
tags:
  - core
  - newsletter
  - blog-integration
  - anti-hallucination

turns:
  - userMessage: "Generate a newsletter about my blog post 'Urging New Institutions'"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "newsletter_generate"

efficiency:
  maxToolCalls: 5
  maxTokens: 50000
