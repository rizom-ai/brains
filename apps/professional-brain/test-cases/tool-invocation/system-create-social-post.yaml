id: tool-invocation-system-create-social-post
name: Social Post Creation via system_create
description: Verifies the agent uses system_create with entityType social-post
type: tool_invocation
tags:
  - core
  - social-media
  - entity-crud

turns:
  - userMessage: "Create a new social media post about our latest product launch and save it as a draft"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
