id: response-quality-data-in-response
name: Agent Shows Actual Data
description: Tests that the agent includes actual data from tool results in its response
type: response_quality
tags:
  - quality
  - formatted-output
  - data-display

turns:
  - userMessage: "What's the status of my brain? Show me system info."

successCriteria:
  expectedTools:
    - toolName: system_get-status
      shouldBeCalled: true
  responseNotContains:
    - "I cannot"
    - "I don't have access"
  minHelpfulnessScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
