id: newsletter-generate-agent
name: Generate newsletter via natural language
description: Tests that the agent uses system_create to generate a newsletter
type: tool_invocation
tags:
  - newsletter
  - agent
  - core

turns:
  - userMessage: "Generate a newsletter about AI trends for my subscribers"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
  toolCountRange:
    min: 1
  responseNotContains:
    - "cannot"
    - "unable"

efficiency:
  maxToolCalls: 5
  maxTokens: 30000
