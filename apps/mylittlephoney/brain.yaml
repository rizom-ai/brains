brain: "@brains/rover"
site: "@brains/site-mylittlephoney"

# Instance settings
logLevel: debug

# Permissions
anchors:
  - "cli:*"
  - "discord:1432013090068627558"
  - "mcp:stdio"

add:
  - decks
remove:
  - image

# Plugin overrides
plugins:
  directory-sync:
    git:
      repo: rizom-ai/mylittlephoney-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: mylittlephoney
      authorEmail: phoney@rizom.ai
  mcp:
    authToken: ${MCP_AUTH_TOKEN}
  discord:
    botToken: ${DISCORD_BOT_TOKEN}
  webserver:
    productionDomain: https://mylittlephoney.com
