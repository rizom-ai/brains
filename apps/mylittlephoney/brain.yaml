brain: "@brains/rover"

# Instance settings
logLevel: debug

# Permissions
anchors:
  - "cli:*"
  - "discord:1432013090068627558"
  - "mcp:stdio"

# Disable unused plugins
disable:
  - decks
  - portfolio
  - topics
  - content-pipeline
  - social-media
  - newsletter
  - matrix

# Plugin overrides
plugins:
  site-builder:
    themeCSS: "@brains/theme-mylittlephoney"
  git-sync:
    repo: rizom-ai/mylittlephoney-content
    authorName: mylittlephoney
    authorEmail: phoney@rizom.ai
  discord: {}
  webserver:
    productionDomain: https://mylittlephoney.com
