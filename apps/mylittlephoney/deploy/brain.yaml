brain: "@brains/rover"
site: "@brains/site-mylittlephoney"

# Production instance
domain: mylittlephoney.com

# Permissions
anchors:
  - "discord:1432013090068627558"

add:
  - decks
remove:
  - image

# Plugin overrides
plugins:
  directory-sync:
    git:
      repo: rizom-ai/mylittlephoney-content
      authToken: ${GIT_SYNC_TOKEN}
      authorName: mylittlephoney
      authorEmail: phoney@rizom.ai
  discord: {}
  webserver:
    productionDomain: https://mylittlephoney.com
  a2a:
    organization: rizom.ai
    trustedTokens:
      ${A2A_TOKEN_YEEHAA}: yeehaa
    outboundTokens:
      yeehaa.io: ${A2A_OUTBOUND_TOKEN_YEEHAA}

permissions:
  rules:
    - pattern: "a2a:yeehaa"
      level: trusted
    - pattern: "a2a:*"
      level: public
