id: topics-merge-aliases-bounded
name: Alias merge is deduped, canonical-safe, and bounded
description: >
  Tests that alias state excludes the canonical title, removes duplicates,
  and stays bounded when many variant titles are proposed.
type: plugin
tags:
  - topics
  - merge
  - aliases
  - metadata
plugin: topics
handler: mergeAliases

input:
  existingAliases:
    - AI Collaboration
    - Human-Agent Collaboration
  canonicalTitle: Human-AI Collaboration
  candidateAliases:
    - Human-AI Collaboration
    - human-agent collaboration
    - Human-Bot Collaboration
    - Agency in Human-AI Collaboration
    - Intelligent Agent Collaboration
    - Collaboration with Agents
    - AI Teamwork

expectedOutput:
  validateEach:
    - path: aliases[0]
      equals: AI Collaboration
    - path: aliases[1]
      equals: Human-Agent Collaboration
    - path: aliases[2]
      equals: Human-Bot Collaboration
    - path: aliases[3]
      equals: Agency in Human-AI Collaboration
    - path: aliases[4]
      equals: Intelligent Agent Collaboration
