id: topics-process-topic-with-auto-merge-synthesis
name: Auto-merge synthesizes canonical topic
description: >
  Tests the end-to-end auto-merge path: seed an existing canonical topic,
  process a new mergeable topic through TopicProcessingBatchHandler, and verify
  the result is a single topic carrying the canonical title.
type: plugin
tags:
  - topics
  - merge
  - synthesis
  - end-to-end
plugin: topics
handler: processTopicWithAutoMerge

input:
  threshold: 0.85
  existingTopics:
    - title: Human-AI Collaboration
      content: |
        AI agents collaborate with humans in shared knowledge systems.
        The core concern is how hybrid teams coordinate meaningful work.
      keywords:
        - AI collaboration
        - agency
        - distributed teams
  incomingTopic:
    title: Human-Agent Collaboration
    content: |
      Software agents participate alongside humans as active contributors.
      They help coordinate knowledge, automate routine tasks, and support
      collective action in distributed teams.
    keywords:
      - AI agents
      - collaborative systems
      - knowledge coordination
    relevanceScore: 0.92

expectedOutput:
  validateEach:
    - path: merged
      equals: 1
    - path: created
      equals: 0
    - path: topicCount
      equals: 1
    - path: topics[0].id
      equals: human-ai-collaboration
    - path: topics[0].title
      matches: "Human.*Collaboration"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minQualityScore: 4
    evaluationPrompt: |
      Evaluate the merged topic:
      1. Does the merged title stay a stable canonical topic rather than a rhetorical variant?
      2. Does the merged content preserve core ideas from both the existing and incoming topic?
      3. Is the result a single coherent topic rather than a concatenation artifact?
