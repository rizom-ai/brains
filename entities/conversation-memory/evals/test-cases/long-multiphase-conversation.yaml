id: summary-long-multiphase-conversation
name: Long multiphase conversation
description: Covers schema, architecture, and eval work across multiple phases.
type: plugin
tags:
  - summary
  - long-context
  - segmentation
plugin: conversation-memory
handler: summarizeMessages

input:
  conversationId: eval-long
  messages:
    - role: user
      content: The summary package is outdated and needs reengineering.
      timestamp: "2026-05-04T16:00:00Z"
    - role: assistant
      content: It should stop using digest events as the source of truth.
      timestamp: "2026-05-04T16:01:00Z"
    - role: user
      content: Yes, derive summaries from stored conversation messages.
      timestamp: "2026-05-04T16:02:00Z"
    - role: assistant
      content: The schema can store entries with title, summary, timeRange, sourceMessageCount, keyPoints, decisions, and actionItems.
      timestamp: "2026-05-04T16:03:00Z"
    - role: user
      content: Use timestamps, not message ranges.
      timestamp: "2026-05-04T16:04:00Z"
    - role: assistant
      content: Agreed, code will assign time spans from source messages.
      timestamp: "2026-05-04T16:05:00Z"
    - role: user
      content: Make a short plan doc first and put it in the proper plans directory.
      timestamp: "2026-05-04T16:20:00Z"
    - role: assistant
      content: I created docs/plans/summary-rearchitecture.md.
      timestamp: "2026-05-04T16:21:00Z"
    - role: user
      content: Now add lots of evals covering decisions, action items, topic shifts, hallucination, and long conversations.
      timestamp: "2026-05-04T16:30:00Z"

expectedOutput:
  minItems: 2
  maxItems: 5
  itemsContain:
    - field: summary
      pattern: "stored conversation messages|source of truth"
    - field: summary
      pattern: "timestamps|timeRange|time spans"
    - field: summary
      pattern: "eval"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minCoverageScore: 4
    minQualityScore: 4
