id: summary-projection-decision-update-correction
name: Projection decision updates contradicted memory
description: Decides to update when new messages correct or reframe existing memory.
type: plugin
tags:
  - summary
  - projection-decision
  - update
plugin: conversation-memory
handler: decideProjection

input:
  conversationId: eval-decision-update
  existingSummary: |
    # Conversation Summary

    ## Summary schema

    The team was leaning toward message ranges for summary entries.
  existingMessageCount: 2
  messages:
    - role: user
      content: Maybe summary entries can use message ranges.
      timestamp: "2026-05-04T10:00:00Z"
    - role: assistant
      content: Message ranges would identify the source messages.
      timestamp: "2026-05-04T10:01:00Z"
    - role: user
      content: "Correction and final decision: do not use message ranges. Use timestamp time ranges because message indexes are brittle."
      timestamp: "2026-05-04T10:05:00Z"
    - role: assistant
      content: Understood. I will update the summary to reflect time ranges as the final decision.
      timestamp: "2026-05-04T10:06:00Z"

expectedOutput:
  validateEach:
    - path: decision
      equals: update
