id: summary-preserves-decisions
name: Preserves explicit decisions
description: Extracts decisions only when the conversation explicitly makes them.
type: plugin
tags:
  - summary
  - decisions
plugin: conversation-memory
handler: summarizeMessages

input:
  conversationId: eval-decisions
  messages:
    - role: user
      content: Should the new summary schema use message indexes or timestamps?
      timestamp: "2026-05-04T11:00:00Z"
    - role: assistant
      content: Timestamps are the healthier abstraction because message indexes are implementation-specific.
      timestamp: "2026-05-04T11:01:00Z"
    - role: user
      content: "Agreed. Decision: summary entries should use time ranges, not message ranges."
      timestamp: "2026-05-04T11:02:00Z"

expectedOutput:
  minItems: 1
  maxItems: 2
  itemsContain:
    - field: decisionsText
      pattern: "time ranges|timestamps"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minQualityScore: 4
    evaluationPrompt: |
      Evaluate whether the output preserves the explicitly stated decision:
      "summary entries should use time ranges, not message ranges."
      Recommendations may appear in summary/keyPoints, but decisions should be limited to explicit accepted decisions.
