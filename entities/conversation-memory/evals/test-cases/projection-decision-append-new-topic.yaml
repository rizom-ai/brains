id: summary-projection-decision-append-new-topic
name: Projection decision appends a new durable topic
description: Decides to append when new messages add a separate durable decision after an existing summary.
type: plugin
tags:
  - summary
  - projection-decision
  - append
plugin: conversation-memory
handler: decideProjection

input:
  conversationId: eval-decision-append
  existingSummary: |
    # Conversation Summary

    ## Summary schema

    The team chose time ranges for summary entries instead of message ranges.
  existingMessageCount: 2
  messages:
    - role: user
      content: I want timestamps, not message ranges, in the summary schema.
      timestamp: "2026-05-04T10:00:00Z"
    - role: assistant
      content: Agreed. Summary entries will use start and end timestamps.
      timestamp: "2026-05-04T10:01:00Z"
    - role: user
      content: "New decision: projection jobs should use a 90-second delayed window with dedupe skip."
      timestamp: "2026-05-04T10:10:00Z"
    - role: assistant
      content: I will schedule one delayed job per conversation and avoid resetting it on later messages.
      timestamp: "2026-05-04T10:11:00Z"

expectedOutput:
  validateEach:
    - path: decision
      equals: append
