id: link-tool-capture-bookmark
name: Link Capture for Bookmarking
description: Verifies that the agent recognizes bookmark/save intent and calls system_create with entityType link
type: tool_invocation
tags:
  - link
  - tool-invocation
  - intent-recognition

turns:
  - userMessage: "Bookmark https://github.com/anthropics/claude-code"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "link"
        url: "https://github.com/anthropics/claude-code"
  toolCountRange:
    min: 1
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
    - "link_capture"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
