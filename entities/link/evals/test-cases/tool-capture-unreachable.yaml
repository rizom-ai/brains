id: link-tool-capture-unreachable
name: Link Capture Handles Unreachable URL
description: Verifies that the agent routes unreachable URL requests through system_create with entityType link rather than pre-emptively refusing or hallucinating success
type: tool_invocation
tags:
  - link
  - tool-invocation
  - anti-hallucination
  - error-handling

turns:
  - userMessage: "Save this link: https://this-domain-definitely-does-not-exist-12345.com/page"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: "link"
        url: "https://this-domain-definitely-does-not-exist-12345.com/page"
  # Agent should indicate failure - don't require specific wording, just check it doesn't claim success
  responseNotContains:
    - "successfully captured"
    - "saved the link"
    - "bookmarked"
    - "Here's what I found"
    - "Here is what I found"
    - "link_capture"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
