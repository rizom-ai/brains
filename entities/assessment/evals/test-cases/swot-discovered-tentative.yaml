id: assessment-swot-status-as-confidence
name: SWOT uses status as a confidence modifier, not the whole story
description: Checks that approval status affects confidence and prioritization without turning the SWOT into a status report.
type: plugin
tags:
  - agent-discovery
  - swot
  - quality
plugin: assessment
handler: deriveSwot

input:
  skills:
    - name: Analysis
      description: Evaluate tradeoffs and evidence quality.
      tags: [analysis, strategy]
      examples: ["Decision memo"]
    - name: Writing
      description: Communicate findings clearly.
      tags: [writing, editorial]
      examples: ["Briefing note"]

  agents:
    - name: Verified Editorial
      kind: professional
      brainName: verified-editorial
      url: https://verified-editorial.example.com
      status: approved
      about: Approved editorial partner.
      skills:
        - name: Editorial Writing
          description: Clear synthesis and explanation.
          tags: [writing, editorial]
      notes: Approved.

    - name: Tentative Video Mesh
      kind: team
      brainName: tentative-video-mesh
      url: https://tentative-video-mesh.example.com
      status: discovered
      about: Pending review video capability.
      skills:
        - name: Video Production
          description: Produces explainers and demos.
          tags: [video, production]
      notes: Not yet approved.

    - name: Tentative Data Forge
      kind: professional
      brainName: tentative-data-forge
      url: https://tentative-data-forge.example.com
      status: discovered
      about: Pending review visualization capability.
      skills:
        - name: Data Visualization
          description: Builds charts and visual summaries.
          tags: [visualization, charts]
      notes: Not yet approved.

expectedOutput:
  validateEach:
    - path: derivedAt
      exists: true
    - path: threats[0].title
      exists: true
    - path: threats[0].detail
      exists: true
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minCoverageScore: 4
    minQualityScore: 4
    evaluationPrompt: |
      Evaluate how confidence and uncertainty are used in this SWOT.

      Good output:
      - uses dependable vs tentative network skill as a confidence modifier or prioritization signal
      - says what the uncertainty means for the owner, such as "review before relying" or "do not plan around this yet"
      - still centers the analysis on the owner's strengths, gaps, risks, and next actions
      - avoids sounding like a status report

      Bad output:
      - turns the SWOT into bookkeeping about approved and discovered agents
      - overstates tentative network skills as firm strengths
      - ignores the practical implication of uncertainty for the owner
      - uses internal jargon instead of plain advice

      Score QUALITY down if confidence labels dominate the analysis instead of supporting useful advice.
