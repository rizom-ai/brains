id: portfolio-tool-create-asks-for-url
name: Portfolio Create Without URL
description: Verifies that the agent can start portfolio generation via system_create even when no project URL is available
type: tool_invocation
tags:
  - portfolio
  - tool-invocation
  - clarification

turns:
  - userMessage: "Create a portfolio case study for my Superconnectors project from 2024"

successCriteria:
  expectedTools:
    - toolName: system_create
      shouldBeCalled: true
      argsContain:
        entityType: project
  responseNotContains:
    - "I cannot"
    - "I don't have access"
    - "I'm unable"
  minAccuracyScore: 3

efficiency:
  maxToolCalls: 3
  maxTokens: 30000
