id: summary-system-messages
name: Handles system messages
description: Preserves relevant system constraints without treating them as user decisions.
type: plugin
tags:
  - summary
  - system
plugin: summary
handler: summarizeMessages

input:
  conversationId: eval-system
  messages:
    - role: system
      content: "Constraint: do not preserve backward compatibility for the summary schema."
      timestamp: "2026-05-04T19:00:00Z"
    - role: user
      content: Rebuild the package with healthy abstractions.
      timestamp: "2026-05-04T19:01:00Z"
    - role: assistant
      content: I will use a clean schema and projection-based architecture.
      timestamp: "2026-05-04T19:02:00Z"

expectedOutput:
  minItems: 1
  maxItems: 1
  itemsContain:
    - field: keyPointsText
      pattern: "backward compatibility|healthy abstractions|projection"
  itemsNotContain:
    - field: decisionsText
      pattern: "backward compatibility"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minQualityScore: 4
