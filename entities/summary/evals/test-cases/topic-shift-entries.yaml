id: summary-topic-shift-entries
name: Separates topic shifts into entries
description: Creates separate entries for distinct phases instead of over-merging unrelated work.
type: plugin
tags:
  - summary
  - segmentation
plugin: summary
handler: summarizeMessages

input:
  conversationId: eval-topic-shift
  messages:
    - role: user
      content: Let's settle the summary schema first. I want timestamps, not message ranges.
      timestamp: "2026-05-04T14:00:00Z"
    - role: assistant
      content: Agreed. The entry schema will use timeRange with start and end ISO datetimes.
      timestamp: "2026-05-04T14:01:00Z"
    - role: user
      content: Now move the plan doc to the proper docs/plans directory.
      timestamp: "2026-05-04T14:10:00Z"
    - role: assistant
      content: I moved it to docs/plans/summary-rearchitecture.md.
      timestamp: "2026-05-04T14:11:00Z"

expectedOutput:
  minItems: 2
  maxItems: 3
  itemsContain:
    - field: summary
      pattern: "timestamps|timeRange|ISO"
    - field: summary
      pattern: "docs/plans|plan doc"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minCoverageScore: 4
    minQualityScore: 4
