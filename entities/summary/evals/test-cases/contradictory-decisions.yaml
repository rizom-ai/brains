id: summary-contradictory-decisions
name: Handles superseded decisions
description: Preserves when a later explicit decision replaces an earlier direction.
type: plugin
tags:
  - summary
  - decisions
plugin: summary
handler: summarizeMessages

input:
  conversationId: eval-contradictory
  messages:
    - role: user
      content: "Decision for now: keep digest events as the summary trigger."
      timestamp: "2026-05-04T18:00:00Z"
    - role: assistant
      content: Noted, digest events remain the trigger for now.
      timestamp: "2026-05-04T18:01:00Z"
    - role: user
      content: "Change that. Final decision: use DerivedEntityProjection from conversation message events instead."
      timestamp: "2026-05-04T18:10:00Z"

expectedOutput:
  minItems: 1
  maxItems: 2
  itemsContain:
    - field: decisionsText
      pattern: "DerivedEntityProjection|conversation message events"
    - field: summary
      pattern: "replaces|changed|superseded|instead"
  qualityCriteria:
    minRelevanceScore: 4
    minAccuracyScore: 4
    minQualityScore: 4
