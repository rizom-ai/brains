id: summary-projection-decision-skip-low-signal
name: Projection decision skips low-signal chatter
description: Decides not to write durable memory for acknowledgement-only messages.
type: plugin
tags:
  - summary
  - projection-decision
  - low-signal
plugin: summary
handler: decideProjection

input:
  conversationId: eval-decision-skip
  messages:
    - role: user
      content: ok
      timestamp: "2026-05-04T15:00:00Z"
    - role: assistant
      content: done
      timestamp: "2026-05-04T15:01:00Z"
    - role: user
      content: continue
      timestamp: "2026-05-04T15:02:00Z"

expectedOutput:
  validateEach:
    - path: decision
      equals: skip
