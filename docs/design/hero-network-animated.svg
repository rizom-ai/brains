<style>
  @keyframes connPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes hubPulse { 0%,100% { opacity: 0.6; transform-origin: center; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes nodeTwinkle { 0%,100% { opacity: 0.3; } 30% { opacity: 0.8; } 70% { opacity: 0.5; } }
