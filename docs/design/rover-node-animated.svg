<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<style>
  @keyframes pulse { 0%,100% { opacity: 0.4; r: 20; } 50% { opacity: 0.7; r: 25; } }
  @keyframes corePulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
  @keyframes tendrilGrow { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
  @keyframes tendrilPulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.45; } }
  .core-glow { animation: pulse 4s ease-in-out infinite; }
  .core-dot { animation: corePulse 3s ease-in-out infinite; }
  .tendril { stroke-dasharray: 200; animation: tendrilGrow 3s ease-out forwards, tendrilPulse 5s ease-in-out infinite; }
  .tendril:nth-child(2) { animation-delay: 0.3s; }
  .tendril:nth-child(3) { animation-delay: 0.6s; }
  .tendril:nth-child(4) { animation-delay: 0.9s; }
  .tendril:nth-child(5) { animation-delay: 1.2s; }
  .tendril:nth-child(6) { animation-delay: 1.5s; }
  .tendril:nth-child(7) { animation-delay: 1.8s; }
  .tendril:nth-child(8) { animation-delay: 2.1s; }
  .tendril:nth-child(9) { animation-delay: 2.4s; }
  .tendril:nth-child(10) { animation-delay: 2.7s; }
</style>
