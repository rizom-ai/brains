<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Brains — Codebase Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

#sidebar{width:260px;min-width:260px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
#sidebar h1{font-size:15px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
#sidebar h1 span{font-size:11px;color:#8b949e;font-weight:400}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#8b949e;margin-bottom:8px}
.section{background:#1c2333;border:1px solid #30363d;border-radius:8px;padding:10px 12px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.preset-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:11px;padding:5px 8px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center}
.preset-btn:hover{background:#30363d;color:#e6edf3}
.preset-btn.active{background:#1f6feb22;border-color:#58a6ff;color:#58a6ff}
.toggle-row{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none;font-size:12px}
.toggle-row:hover{opacity:.85}
.toggle-box{width:12px;height:12px;border-radius:3px;border:2px solid;flex-shrink:0;position:relative;transition:all .15s}
.toggle-box.on::after{content:'';position:absolute;inset:1px;border-radius:1px;background:currentColor}
.stats{font-size:11px;color:#8b949e;line-height:1.6}
.stats b{color:#c9d1d9}

#main{flex:1;display:flex;flex-direction:column;min-width:0}
#canvas-area{flex:1;position:relative;overflow:hidden;background:#0d1117}
#canvas-area svg{width:100%;height:100%;display:block}
.zoom-bar{position:absolute;top:10px;right:10px;display:flex;gap:3px}
.zoom-btn{background:#21262dee;border:1px solid #30363d;border-radius:6px;color:#8b949e;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;backdrop-filter:blur(4px)}
.zoom-btn:hover{background:#30363dee;color:#e6edf3}

.legend{position:absolute;bottom:10px;left:10px;background:#161b22ee;border:1px solid #30363d;border-radius:8px;padding:10px 14px;backdrop-filter:blur(4px);display:flex;gap:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#8b949e}
.legend-dot{width:10px;height:10px;border-radius:3px}

.node-group{cursor:pointer}
.node-group:hover .node-bg{filter:brightness(1.4)}
.node-label{font-size:11px;font-weight:600;fill:#e6edf3;pointer-events:none}
.node-sub{font-size:9px;fill:#8b949e;pointer-events:none;font-family:'SF Mono',Menlo,monospace}

#detail{position:absolute;top:10px;left:10px;width:300px;background:#161b22ee;border:1px solid #30363d;border-radius:8px;padding:14px;backdrop-filter:blur(8px);display:none}
#detail.open{display:block}
#detail h3{font-size:14px;font-weight:600;margin-bottom:2px}
#detail .path{font-size:11px;color:#58a6ff;font-family:monospace;margin-bottom:6px}
#detail .desc{font-size:12px;color:#8b949e;line-height:1.5}
#detail .close{position:absolute;top:8px;right:10px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px}
#detail .close:hover{color:#f0f6fc}
#detail .deps{margin-top:8px;font-size:11px;color:#484f58}
#detail .deps span{color:#8b949e;cursor:pointer}
#detail .deps span:hover{color:#58a6ff;text-decoration:underline}
</style>
</head>

  // Defs
  let html = `<defs>`;
  for (const [type, style] of Object.entries(connStyles)) {
    html += `<marker id="arrow-${type}" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="${style.color}"/>
    </marker>`;
  }
  html += `</defs>`;

  html += `<g transform="translate(${tx},${ty}) scale(${scale})">`;

  // Connections
  for (const c of connections) {
    if (!visible.has(c.from) || !visible.has(c.to)) continue;
    const f = nodes.find(n => n.id === c.from);
    const t = nodes.find(n => n.id === c.to);
    if (!f || !t) continue;
    const style = connStyles[c.type] || connStyles.dep;
    const x1 = f.x + f.w/2, y1 = f.y + f.h;
    const x2 = t.x + t.w/2, y2 = t.y;
    const my = (y1 + y2) / 2;
    html += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"
      fill="none" stroke="${style.color}" stroke-width="1.5" opacity="0.5"
      ${style.dash ? `stroke-dasharray="${style.dash}"` : ''}
      marker-end="url(#arrow-${c.type})"/>`;
  }

  // Nodes
  for (const n of nodes) {
    if (!visible.has(n.id)) continue;
    const col = layers[n.layer]?.color || '#6b7280';
    html += `<g class="node-group" onclick="showDetail('${n.id}')">
      <rect class="node-bg" x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}"
        rx="6" fill="${col}18" stroke="${col}66" stroke-width="1.5"/>
      <text class="node-label" x="${n.x + n.w/2}" y="${n.y + 18}" text-anchor="middle">${n.label}</text>
      <text class="node-sub" x="${n.x + n.w/2}" y="${n.y + 32}" text-anchor="middle">${n.sub}</text>
    </g>`;
  }

  html += `</g>`;
  svg.innerHTML = html;

  // Stats
  const eCnt = nodes.filter(n => n.layer === 'entities').length;
  const pCnt = nodes.filter(n => n.layer === 'plugins').length;
  const iCnt = nodes.filter(n => n.layer === 'interfaces').length;
  const sCnt = nodes.filter(n => n.layer === 'shell').length;
  document.getElementById('stats').innerHTML = `
    <b>${nodes.length}</b> packages<br>
    <b>${eCnt}</b> entity plugins · <b>${pCnt}</b> integration plugins<br>
    <b>${iCnt}</b> interfaces · <b>${sCnt}</b> shell services<br>
    <b>${connections.length}</b> connections
  `;
}

function renderControls() {
  // Presets
  let ph = '';
  for (const name of Object.keys(presets)) {
    const cls = name === activePreset ? ' active' : '';
    ph += `<button class="preset-btn${cls}" onclick="setPreset('${name}')">${name}</button>`;
  }
  document.getElementById('presets').innerHTML = ph;

  // Layers
  let lh = '';
  for (const [key, layer] of Object.entries(layers)) {
    const cls = layer.on ? ' on' : '';
    lh += `<div class="toggle-row" onclick="toggleLayer('${key}')">
      <div class="toggle-box${cls}" style="border-color:${layer.color};color:${layer.color}"></div>
      ${layer.label}
    </div>`;
  }
  document.getElementById('layers').innerHTML = lh;

  // Legend
  let leg = '';
  for (const [, style] of Object.entries(connStyles)) {
    leg += `<div class="legend-item"><div class="legend-dot" style="background:${style.color}"></div>${style.label}</div>`;
  }
  document.getElementById('legend').innerHTML = leg;
}

function setPreset(name) {
  activePreset = name;
  presets[name]();
  renderControls();
  render();
}

function toggleLayer(key) {
  layers[key].on = !layers[key].on;
  activePreset = '';
  renderControls();
  render();
}

function zoom(factor) {
  scale *= factor;
  render();
}

function resetZoom() {
  scale = 1; tx = 0; ty = 0;
  render();
}

function showDetail(id) {
  const n = nodes.find(x => x.id === id);
  if (!n) return;
  document.getElementById('d-name').textContent = n.label;
  document.getElementById('d-path').textContent = n.sub;
  document.getElementById('d-desc').textContent = n.desc;

  const deps = connections.filter(c => c.from === id || c.to === id);
  if (deps.length) {
    const items = deps.map(c => {
      const other = c.from === id ? c.to : c.from;
      const otherNode = nodes.find(x => x.id === other);
      const dir = c.from === id ? '→' : '←';
      return `<span onclick="showDetail('${other}')">${dir} ${otherNode?.label || other}</span>`;
    });
    document.getElementById('d-deps').innerHTML = 'Connections: ' + items.join(' · ');
  } else {
    document.getElementById('d-deps').innerHTML = '';
  }

  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

// Pan
let dragging = false, dragX, dragY;
document.getElementById('canvas-area').addEventListener('mousedown', e => {
  if (e.target.closest('.node-group,.zoom-btn,#detail')) return;
  dragging = true; dragX = e.clientX; dragY = e.clientY;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - dragX; ty += e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  render();
});
document.addEventListener('mouseup', () => dragging = false);
document.getElementById('canvas-area').addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.08 : 1/1.08);
}, { passive: false });

renderControls();
render();
</script>
</body>
</html>
