service: __SERVICE_NAME__
image: <%= ENV['IMAGE_REPOSITORY'] %>

servers:
  web:
    hosts:
      - <%= ENV['SERVER_IP'] %>

proxy:
  ssl:
    certificate_pem: CERTIFICATE_PEM
    private_key_pem: PRIVATE_KEY_PEM
  hosts:
    - <%= ENV['BRAIN_DOMAIN'] %>
    # <% if ENV['WWW_DOMAIN'] && !ENV['WWW_DOMAIN'].empty? %>
    - <%= ENV['WWW_DOMAIN'] %>
    # <% end %>
    - <%= ENV['PREVIEW_DOMAIN'] %>
  app_port: 8080
  healthcheck:
    path: /health

registry:
  server: ghcr.io
  username: <%= ENV['REGISTRY_USERNAME'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    NODE_ENV: production
  secret:
    - AI_API_KEY
    - GIT_SYNC_TOKEN
    - DISCORD_BOT_TOKEN
    - SETUP_EMAIL_TO
    - SETUP_EMAIL_API_KEY
    - SETUP_EMAIL_FROM

volumes:
  - /opt/brain-data:/app/brain-data
  - /opt/brain-runtime:/app/data
  - /opt/brain-state:/data
  - /opt/brain-config:/config
  - /opt/brain-dist:/app/dist
  - /opt/brain.yaml:/app/brain.yaml
