name: Deploy

on:
  workflow_dispatch:
    inputs:
      handle:
        description: User handle
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-${{ inputs.handle }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HANDLE: ${{ inputs.handle }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Install operator tooling
        run: bun install

      - name: Reconcile selected user config
        run: bunx brains-ops onboard "$GITHUB_WORKSPACE" "$HANDLE"

      - name: Prepare selected brain.yaml for Kamal
        run: |
          cp "users/$HANDLE/brain.yaml" brain.yaml
          echo "BRAIN_YAML_PATH=users/$HANDLE/brain.yaml" >> "$GITHUB_ENV"
          BRAIN_DOMAIN="$(grep '^domain:' "users/$HANDLE/brain.yaml" | sed 's/^domain:[[:space:]]*//' | tr -d '"' | tr -d "'")"
          if [ -z "$BRAIN_DOMAIN" ]; then
            echo "Missing domain in users/$HANDLE/brain.yaml" >&2
            exit 1
          fi
          echo "BRAIN_DOMAIN=$BRAIN_DOMAIN" >> "$GITHUB_ENV"

      - name: Upload generated config
        uses: actions/upload-artifact@v4
        with:
          name: generated-${{ inputs.handle }}-config
          path: |
            users/${{ inputs.handle }}/brain.yaml
            users/${{ inputs.handle }}/.env
            views/users.md

      - name: Commit generated config
        run: |
          if git diff --quiet -- "users/$HANDLE/brain.yaml" "users/$HANDLE/.env" views/users.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "users/$HANDLE/brain.yaml" "users/$HANDLE/.env" views/users.md
          git commit -m "chore(ops): reconcile $HANDLE"
          git push
