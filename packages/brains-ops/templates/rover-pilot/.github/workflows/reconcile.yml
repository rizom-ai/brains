name: Reconcile

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - pilot.yaml
      - cohorts/**
      - users/*.yaml
      - .github/workflows/reconcile.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      BRAINS_REPO: rizom-ai/brains
      BRAINS_REF: main
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: actions/checkout@v5
        with:
          repository: rizom-ai/brains
          ref: main
          path: .brains
          token: ${{ secrets.BRAINS_REPO_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Install brains workspace dependencies
        run: bun install --cwd .brains --frozen-lockfile

      - name: Reconcile generated pilot outputs
        run: bun .brains/packages/brains-ops/src/entrypoint.ts reconcile-all "$GITHUB_WORKSPACE"

      - name: Commit generated outputs
        run: |
          if git diff --quiet -- views users; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add views users
          git commit -m "chore(ops): reconcile pilot outputs"
          git push
