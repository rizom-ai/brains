name: Reconcile

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - pilot.yaml
      - cohorts/**
      - users/*.yaml
      - .github/workflows/reconcile.yml

permissions:
  contents: write

concurrency:
  group: reconcile
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Install operator tooling
        run: bun install

      - name: Reconcile generated pilot outputs
        run: bunx brains-ops reconcile-all "$GITHUB_WORKSPACE"

      - name: Commit generated outputs
        run: |
          if git diff --quiet -- views users; then
            exit 0
          fi

          git fetch origin "${{ github.ref_name }}"
          if git diff --quiet "origin/${{ github.ref_name }}" -- views users; then
            exit 0
          fi

          patch_file="$(mktemp)"
          git diff --binary -- views users > "$patch_file"
          git reset --hard "origin/${{ github.ref_name }}"
          git apply --3way --index "$patch_file"

          if git diff --cached --quiet -- views users; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(ops): reconcile pilot outputs"
          git push origin HEAD:${{ github.ref_name }}
