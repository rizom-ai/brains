name: Build

on:
  workflow_dispatch:
    inputs:
      brain_version:
        description: Brain version to build; defaults to pilot.yaml brainVersion
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - pilot.yaml
      - cohorts/*.yaml
      - users/*.yaml
      - package.json
      - bun.lock
      - deploy/**
      - .github/workflows/build.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Install operator tooling
        run: bun install

      - name: Resolve image metadata inputs
        env:
          BRAIN_VERSION_INPUT: ${{ inputs.brain_version || '' }}
        run: |
          bun deploy/scripts/resolve-build-config.ts
          echo "IMAGE_REPOSITORY=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          target: fleet
          push: true
          build-args: |
            BRAIN_VERSION=${{ env.BRAIN_VERSION }}
            SITE_PACKAGES=${{ env.SITE_PACKAGES }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            service=rover
